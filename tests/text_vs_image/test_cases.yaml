- id: tc02_judge
  title: '[JUDGMENT] UI 変更要求の工数見積'
  image: tests/text_vs_image/images/02_ui_change.png
  image_type: ui_change_request
  test_type: judgment
  specialized_prompt: prompts/ui_change.md
  question: 'この UI 変更要求について、プロダクトマネージャーの立場で判断してください。

    既存画面と 4 つの赤い吹き出しの変更要求を読み、以下 4 点に具体的に答えてください。


    (1) 4 つの変更要求それぞれの実装工数見積もり (Small / Medium / Large) と理由。

    (2) 各変更がバックエンド (API) の変更を必要とするか否か。

    (3) 最も技術的リスクが高い変更はどれで、その理由は何か。

    (4) これら 4 つの変更を並列で実装できますか? 依存関係があれば指摘してください。

    '
  reasoning_points:
  - id: j01
    text: '変更 1 (Remember last search): 工数は Small or Medium'
  - id: j02
    text: '変更 2 (ボタン色変更): 工数は Small'
  - id: j03
    text: '変更 3 (CSV エクスポート): 工数は Medium or Large'
  - id: j04
    text: '変更 4 (20 件表示): 工数は Small'
  - id: j05
    text: 変更 3 はバックエンド変更が必要
  - id: j06
    text: 技術リスク最高は変更 3 (CSV エクスポート)
  - id: j07
    text: 4 つの変更は基本的に並列実装可能
  descriptions:
    gemini_3_flash:
      generic: "ご提示いただいた画像は「ShopApp」というアプリケーションの製品検索画面に対するUI変更リクエスト（UI Change Request）を記述したドキュメントです。\n\n構成要素に基づいて、構造的に記述します。\n\
        \n---\n\n### 1. テキスト内容 (OCR)\n\n**ヘッダー情報:**\n*   UI Change Request — ShopApp Product Search\n*   Reviewer: PM / Design\
        \ — 2026-04-10\n\n**UI内テキスト:**\n*   ShopApp\n*   Login (ボタン)\n*   Search products... (検索バー内プレースホルダー)\n*   Search (ボタン)\n\
        *   **Filters (左サイドバー):**\n    *   Electronics\n    *   Books\n    *   Clothing\n    *   Price range\n    *   ¥0 -\
        \ ¥50,000\n*   **Product Table (中央テーブル):**\n    *   ヘッダー: Product, Price, Stock\n    *   行1: Wireless Headphones,\
        \ ¥12,800, 42\n    *   行2: USB-C Hub (7-in-1), ¥4,500, 118\n    *   行3: Mech. Keyboard, ¥15,200, 7\n*   **Pagination\
        \ (ページネーション):**\n    *   < , 1 , 2 , 3 , >\n\n**変更リクエスト (赤枠内の注釈):**\n1.  1. Add a \"Remember last search\" checkbox\
        \ below the search bar.\n2.  2. Change the Search button color from blue to green.\n3.  3. Add a CSV export button\
        \ on the results table top-right corner.\n4.  4. Show 20 items per page instead of the current 10.\n\n**Legend (凡例):**\n\
        *   Legend\n*   Red = change request\n*   Gray = existing UI\n\n---\n\n### 2. 図表・ダイアグラムの構造\n\nこの画像は、**ベースとなるUIレイアウト**と、それに対する**修正指示（アノテーション）**の2層構造になっています。\n\
        \n**UIの階層構造:**\n*   **最上位:** アプリケーションウィンドウ\n    *   **ヘッダー:** ロゴ(左)とログインボタン(右)\n    *   **メインコンテンツ:**\n        * \
