    text: 凡例にサブネット色分け (Public=青, Private App=黄, DB=緑) が記載
  descriptions:
    generic: "画像から読み取れる情報を構造的に記述します。\n\n### 1. テキスト内容（OCR）\n\n**タイトル・ヘッダー部分:**\n*   Production Architecture — AWS Multi-AZ\n\
      *   Environment: prod • Region: ap-northeast-1\n\n**外部/グローバルリソース（上部・右部）:**\n*   Route 53 DNS\n*   CloudFront CDN\n*\
      \   S3 Static Assets\n*   IAM Roles\n*   CloudWatch Logs/Metrics\n\n**接続ラベル（上部）:**\n*   origin (CloudFrontからS3の間)\n\
      *   HTTPS (CloudFrontの下)\n\n**階層枠のラベル:**\n*   VPC: 10.0.0.0/16\n*   AZ-a (ap-northeast-1a)\n*   AZ-b (ap-northeast-1c)\n\
      *   Public Subnet (AZ-a, AZ-bの両方に存在)\n*   Private Subnet (App) (AZ-a, AZ-bの両方に存在)\n*   DB Subnet (AZ-a, AZ-bの両方に存在)\n\
      \n**AZ-a内のノードとラベル:**\n*   ALB (AZ-a)\n*   NAT GW (AZ-a)\n*   Outbound (NAT GWの上)\n*   ECS Fargate App Service (AZ-a)\n\
      *   GET/SET (ECSからRedisの間)\n*   write (ECSからRDS Primaryの間)\n*   ElastiCache Redis\n*   RDS PostgreSQL Primary\n\n**AZ-b内のノードとラベル:**\n\
      *   ALB (AZ-b)\n*   NAT GW (AZ-b)\n*   ECS Fargate App Service (AZ-b)\n*   read-only (ECSからRDS Read Replicaの間)\n*  \
      \ ElastiCache Redis\n*   RDS PostgreSQL Read Replica\n\n**凡例 (Legend - 下部):**\n*   Public Subnet\n*   Private Subnet\
      \ (App)\n*   DB Subnet\n*   External / DNS\n*   Cache\n\n---\n\n### 2. 図表・ダイアグラムの構造（ノード・接続・階層）\n\n**階層構造:**\n図は大きく分けて「VPC外（外部リソース）」と「VPC内」に分かれており、VPC内はさらにアベイラビリティゾーン（AZ）とサブネットによって階層化されています。\n\
      1.  **最上位**: VPC外部。左上に通信の入り口となるリソース、右上に管理・監視系リソースが配置されています。\n2.  **VPC階層**: 「VPC: 10.0.0.0/16」という大きな枠で囲まれています。\n3. \
      \ **AZ階層**: VPCの中に「AZ-a」と「AZ-b」という2つの独立した枠が左右に並んでいます。\n4.  **サブネット階層**: 各AZの中に、上から「Public Subnet」「Private Subnet (App)」「DB\
      \ Subnet」の3つの水平な枠が配置されています。\n\n**ノードの配置:**\n*   **VPC外**: 「Route 53 DNS」「CloudFront CDN」「S3 Static Assets」が左上から水平に並び、「IAM\
      \ Roles」「CloudWatch Logs/Metrics」が右端に縦に並んでいます。\n*   **Public Subnet内**: 各AZに「ALB」と「NAT GW」が配置されています。\n*   **Private\
      \ Subnet (App)内**: 各AZに「ECS Fargate App Service」と「ElastiCache Redis」が配置されています。\n*   **DB Subnet内**: AZ-aに「RDS PostgreSQL\
      \ Primary」、AZ-bに「RDS PostgreSQL Read Replica」が配置されています。\n\n**接続（矢印の向きとフロー）:**\n*   `Route 53 DNS` → `CloudFront CDN`\n\
      *   `CloudFront CDN` → `S3 Static Assets` (ラベル: origin)\n*   `CloudFront CDN` → AZ-aの`ALB` (ラベル: HTTPS) および AZ-bの`ALB`\n\
      *   AZ-aの`NAT GW` → 上方向（枠外）へ (ラベル: Outbound)\n*   AZ-bの`NAT GW` → 上方向（枠外）へ\n*   各AZの `ALB` → 同じAZ内の `ECS Fargate App\
      \ Service`\n*   AZ-aの `ECS Fargate App Service` → AZ-aの `ElastiCache Redis` (ラベル: GET/SET)\n*   AZ-bの `ECS Fargate App\
      \ Service` → AZ-bの `ElastiCache Redis`\n*   AZ-aの `ECS Fargate App Service` → `RDS PostgreSQL Primary` (緑色の矢印、ラベル: write)\n\
      *   AZ-aの `ECS Fargate App Service` → `RDS PostgreSQL Read Replica` (緑色の矢印)\n*   AZ-bの `ECS Fargate App Service` → `RDS\
      \ PostgreSQL Read Replica` (青緑色の矢印、ラベル: read-only)\n*   VPC内の複数のコンポーネント（両AZの`ALB`, `NAT GW`, `ECS`）から、右上の `CloudWatch\
      \ Logs/Metrics` に向かって、非常に薄い破線の矢印が伸びています。\n\n---\n\n### 3. 色とレイアウト\n\n**レイアウト:**\n*   上部にタイトル群、その下に外部からのリクエストの入り口となるコンポーネントが配置されています。\n\
      *   メインの構造は中央の大きなVPC枠であり、その中でAZ-a（左）とAZ-b（右）が左右対称に近い形で並んでいます（データベース層のみPrimaryとRead Replicaで非対称）。\n*   各AZ内のサブネットは、上からパブリック、プライベート（アプリケーション）、データベースという順序で水平に積み重なっています。\n\
      *   画面下部に凡例（レジェンド）が1行で配置されています。\n\n**色使い:**\n*   **テキスト**: 基本は黒ですが、VPCのラベルは紫、AZとPublic Subnetのラベルは青色、DB Subnetのラベルは緑色、矢印のラベル（write,\
      \ read-only等）も矢印の色に合わせて緑や青緑が使われています。\n*   **枠線**:\n    *   VPC: 太い紫色の破線\n    *   AZ: 青緑色（ティール）の破線\n    *   Public Subnet:\
      \ 薄い青色の実線（背景も非常に薄い青）\n    *   Private Subnet: 薄いオレンジ/黄色の実線（背景も非常に薄い黄色）\n    *   DB Subnet: 薄い緑色の実線（背景も非常に薄い緑）\n*   **ノードの塗りつぶし色**:\n\
      \    *   薄紫色: Route 53\n    *   黄色/オレンジ系: CloudFront, ALB, NAT GW\n    *   薄緑色: S3, RDS PostgreSQL\n    *   ピンク色: IAM\
      \ Roles, CloudWatch Logs/Metrics, ElastiCache Redis\n    *   肌色/ピーチ色: ECS Fargate App Service\n*   **凡例の色指定**:\n   \
      \ *   Public Subnet: 薄青色の四角\n    *   Private Subnet (App): 薄黄色の四角\n    *   DB Subnet: 薄緑色の四角\n    *   External / DNS:\
      \ 薄紫色の四角\n    *   Cache: ピンク色の四角\n\n---\n\n### 4. 主要な視覚要素\n\n*   **図形の形状**:\n    *   **角丸四角形**: Route 53, CloudFront,\
      \ IAM Roles, CloudWatch Logs/Metrics, ALB, ECS Fargate, ElastiCache Redisに使用されています。多くの主要サービスを示しています。\n    *   **直角の四角形**:\
      \ S3, NAT GWに使用されています。\n    *   **円柱形（立体的なドラム缶状）**: データベースであることを示す一般的な記号として、RDS PostgreSQL（PrimaryおよびRead Replica）に使用されています。\n\
      *   **線種**:\n    *   **実線の矢印**: 明確なデータの流れやリクエストの経路（黒色）、またはデータベースへのアクセス（緑色、青緑色）を示しています。\n    *   **破線の矢印**: メトリクスやログの送信など、バックグラウンドでの情報の流れ（CloudWatch宛ての薄い線）を示しています。\n\
      \    *   **破線の枠**: 論理的な境界であるVPCやAZを囲むために使用されています。\n    *   **実線の枠**: より具体的なネットワークの区切りであるサブネットを囲むために使用されています。"
    specialized: "ご提示いただいたシステム構成図に基づいて、Mermaid表記、ノード一覧、接続一覧、補足情報を出力します。\n\n## Mermaid 表記\n\n```mermaid\nflowchart TB\n   \
