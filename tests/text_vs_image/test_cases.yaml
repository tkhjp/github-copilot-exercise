      *(注: NAT GWやCloudWatchへの線は画像上で細いグレーの線で表現されているため、Mermaid上では点線 `-.->` を用いて主データフローと区別しています。また、NAT GWからの「Outbound」矢印の先として便宜上\
      \ `Internet` ノードを設置しています)*\n\n---\n\n## ノード一覧\n\n| ID | ラベル | 種別（service/db/queue/external/...） |\n|---|---|---|\n|\
      \ route53 | Route 53<br>DNS | external / dns |\n| cloudfront | CloudFront<br>CDN | external / cdn |\n| s3 | S3<br>Static\
      \ Assets | storage / object |\n| alb_a | ALB<br>(AZ-a) | network / loadbalancer |\n| nat_a | NAT GW<br>(AZ-a) | network\
      \ / gateway |\n| ecs_a | ECS Fargate<br>App Service<br>(AZ-a) | service / compute |\n| redis_a | ElastiCache<br>Redis\
      \ | cache |\n| rds_primary | RDS PostgreSQL<br>Primary | db (primary) |\n| alb_b | ALB<br>(AZ-b) | network / loadbalancer\
      \ |\n| nat_b | NAT GW<br>(AZ-b) | network / gateway |\n| ecs_b | ECS Fargate<br>App Service<br>(AZ-b) | service / compute\
      \ |\n| redis_b | ElastiCache<br>Redis | cache |\n| rds_replica | RDS PostgreSQL<br>Read Replica | db (replica) |\n|\
      \ iam | IAM<br>Roles | security / identity |\n| cloudwatch | CloudWatch<br>Logs/Metrics | monitoring |\n\n---\n\n##\
      \ 接続一覧\n\n| From | To | ラベル（プロトコル等） |\n|---|---|---|\n| Route 53 DNS | CloudFront CDN | |\n| CloudFront CDN | S3 Static\
      \ Assets | origin |\n| CloudFront CDN | ALB (AZ-a) | HTTPS |\n| CloudFront CDN | ALB (AZ-b) | |\n| ALB (AZ-a) | ECS\
      \ Fargate App Service (AZ-a) | |\n| ALB (AZ-b) | ECS Fargate App Service (AZ-b) | |\n| ECS Fargate App Service (AZ-a)\
      \ | ElastiCache Redis (AZ-a) | GET/SET |\n| ECS Fargate App Service (AZ-b) | ElastiCache Redis (AZ-b) | |\n| ECS Fargate\
      \ App Service (AZ-a) | RDS PostgreSQL Primary | write |\n| ECS Fargate App Service (AZ-a) | RDS PostgreSQL Read Replica\
      \ | |\n| ECS Fargate App Service (AZ-b) | RDS PostgreSQL Primary | |\n| ECS Fargate App Service (AZ-b) | RDS PostgreSQL\
      \ Read Replica | read-only |\n| ECS Fargate App Service (AZ-a) | NAT GW (AZ-a) | |\n| ECS Fargate App Service (AZ-b)\
      \ | NAT GW (AZ-b) | |\n| NAT GW (AZ-a) | (外部/Internet) | Outbound |\n| NAT GW (AZ-b) | (外部/Internet) | |\n| ECS Fargate\
      \ App Service (AZ-a) | CloudWatch Logs/Metrics | |\n| ECS Fargate App Service (AZ-b) | CloudWatch Logs/Metrics | |\n\
      \n---\n\n## 補足\n\n- **タイトル:** Production Architecture — AWS Multi-AZ\n- **サブタイトル (注釈):** Environment: prod • Region:\
      \ ap-northeast-1\n- **凡例 (Legend):**\n  - 水色 (Light Blue): Public Subnet\n  - 薄黄色 (Light Yellow): Private Subnet (App)\n\
      \  - 薄緑色 (Light Green): DB Subnet\n  - 薄紫色 (Light Purple): External / DNS\n  - 薄ピンク色 (Light Pink): Cache\n- **グルーピングの階層と名前:**\n\
      \  - `VPC: 10.0.0.0/16` (一番外側の紫点線枠)\n    - `AZ-a (ap-northeast-1a)` (青緑点線枠・左)\n      - `Public Subnet`\n      - `Private\
      \ Subnet (App)`\n      - `DB Subnet`\n    - `AZ-b (ap-northeast-1c)` (青緑点線枠・右)\n      - `Public Subnet`\n      - `Private\
      \ Subnet (App)`\n      - `DB Subnet`\n- **その他構造化できない注釈:**\n  - `IAM Roles` ノードは他のコンポーネントと明示的な線で結ばれていませんが、AWS環境全体（特にECSタスク等）に対して権限を提供していることを示唆して配置されています。\n\
