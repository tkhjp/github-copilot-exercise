    text: 変更間の強い依存関係はない
  descriptions:
    generic: "画像から読み取れる情報を構造的かつ詳細に記述します。\n\n### 1. テキスト内容（OCR）\n\n**ヘッダー部分:**\n*   UI Change Request — ShopApp Product Search\n\
      *   Reviewer: PM / Design — 2026-04-10\n\n**UIモックアップ部分（左側）:**\n*   ShopApp\n*   Login\n*   Search products...\n*   Search\n\
      *   Filters\n*   Electronics\n*   Books\n*   Clothing\n*   Price range\n*   ¥0 - ¥50,000\n*   Product\n*   Price\n*\
      \   Stock\n*   Wireless Headphones\n*   ¥12,800\n*   42\n*   USB-C Hub (7-in-1)\n*   ¥4,500\n*   118\n*   Mech. Keyboard\n\
      *   ¥15,200\n*   7\n*   <\n*   1\n*   2\n*   3\n*   >\n\n**注釈部分（右側の赤い枠内、上から順）:**\n*   1. Add a \"Remember last search\"\
      \ checkbox below the search bar.\n*   2. Change the Search button color from blue to green.\n*   3. Add a CSV export\
      \ button on the results table top-right corner.\n*   4. Show 20 items per page instead of the current 10.\n\n**凡例部分（右下）:**\n\
      *   Legend\n*   Red = change request\n*   Gray = existing UI\n\n---\n\n### 2. 図表・ダイアグラムの構造（ノード・接続・階層）\n\n画像は大きく「既存のUIモックアップ（左側の大きなグレーの枠内）」と「変更要求の注釈（右側の赤い枠）」の2つの階層で構成されており、赤い矢印（接続）で結びつけられています。\n\
      \n*   **ノード1（注釈1）と接続:**\n    *   **起点:** 右上段の赤枠「1. Add a...」内のテキスト下部。\n    *   **終点:** UI内の「Search products...」入力フィールドのすぐ下の余白部分。赤い矢印で接続されている。\n\
      *   **ノード2（注釈2）と接続:**\n    *   **起点:** 右から2番目の赤枠「2. Change the...」内のテキスト下部。\n    *   **終点:** UI内の青い「Search」ボタン。赤い矢印で接続されており、ボタン内の「Search」という文字の上には赤い横線（取り消し線）が引かれている。\n\
      *   **ノード3（注釈3）と接続:**\n    *   **起点:** 右から3番目の赤枠「3. Add a...」内のテキスト下部。\n    *   **終点:** UI内の表のヘッダー行、右端（「Stock」の右側）の余白部分。赤い矢印で接続されている。\n\
      *   **ノード4（注釈4）と接続:**\n    *   **起点:** 右下段の赤枠「4. Show 20...」内のテキスト下部。\n    *   **終点:** UI内のページネーション部分。赤い矢印で接続されており、ページ番号の「2」の上には赤い横線（取り消し線）が引かれている。\n\
      \n---\n\n### 3. 色とレイアウト\n\n*   **全体レイアウト:** 白い背景。上部にタイトルヘッダーがあり、その下に横線が引かれている。画面の左約3/4をUIモックアップが占め、右約1/4に注釈と凡例が縦に配置されている。\n\
      *   **UIモックアップの色使い:**\n    *   **全体枠:** グレーの細い実線。\n    *   **トップナビゲーション:** 濃いネイビーブルーの背景に白抜き文字（ShopApp）。「Login」ボタンは透明背景に白い枠線と文字。\n\
      \    *   **検索エリア:** 白い入力フィールド（グレーの枠線とプレースホルダーテキスト）と、青い背景に白文字の「Search」ボタン。\n    *   **サイドバー（Filters）:** 薄いグレーの背景にグレーの枠線。チェックボックスは白背景にグレーの枠。スライダーバーはグレーの線の上に青い丸（ハンドル）と青い線。\n\
      \    *   **表（Table）:** ヘッダー行は薄いグレーの背景に黒文字（太字）。データ行は白背景に黒文字。各セルは細いグレーの線で区切られている。\n    *   **ページネーション:** 白背景にグレーの枠と黒文字。現在選択されている「1」のみ、青背景に白文字。\n\
      *   **注釈と凡例の色使い:**\n    *   **注釈:** 文字、枠線、矢印、取り消し線のすべてが赤色（Red）。\n    *   **凡例（Legend）:** 薄い黄色の背景に茶色の枠線。「Legend」の文字は茶色/濃い赤。「Red\
      \ = ...」の隣には赤い短い横線、「Gray = ...」の隣にはグレーの枠線を持つ白い四角形が配置されている。\n\n---\n\n### 4. 主要な視覚要素\n\n*   **テキスト入力フィールド:** 検索ワードを入力するための長方形のエリア。\n\
      *   **ボタン要素:** 「Login」「Search」およびページネーションの各数字・記号。\n*   **チェックボックス:** 複数選択可能な四角い入力要素（Electronics, Books, Clothing）。\n\
      *   **レンジスライダー:** 価格帯（Price range）を指定するための、2つの青いハンドルを持つ水平バー。\n*   **データテーブル:** 「Product」「Price」「Stock」の3列で構成されるグリッド状の表。3行のデータが含まれる。\n\
      *   **ページネーション:** ページを切り替えるための「<」「1」「2」「3」「>」のブロック。\n*   **アノテーション（注釈）マークアップ:** UI上に上書きされた手書き風の赤い線（矢印と取り消し線）およびテキストボックス。変更の指示を視覚的に強調している。\n\
      *   **凡例ボックス:** 画面内の色の意味（赤＝変更要求、グレー＝既存UI）を定義する独立したパネル。"
    specialized: "指示に従い、画像を解析して3つのステップで出力します。\n\n## Step 1: 現在の UI 画面要素の列挙\n\n- **Header**:\n  - ロゴ名: ShopApp\n  - ボタン種類:\
      \ Loginボタン\n- **Search**:\n  - 入力欄: プレースホルダー「Search products...」付きのテキストボックス\n  - ボタン: 「Search」ボタン（現在の色は青色）\n- **Filters**:\
      \ \n  - チェックボックス: Electronics, Books, Clothing\n  - スライダー: Price range（¥0 - ¥50,000）\n- **Results**: \n  - テーブルの列名:\
      \ Product, Price, Stock\n  - 行数: 3行（データ行）\n- **Pagination**: \n  - ページャの現在の状態: 「<」「1」「2」「3」「>」のボタンがあり、「1」が青背景でアクティブになっている\n\
      \n## Step 2: 変更要求の抽出（最重要）\n\n| # | 吹き出し内のテキスト | 対象 UI 要素 | 変更内容 |\n|---|---|---|---|\n| 1 | 1. Add a \"Remember last\
      \ search\" checkbox below the search bar. | Search入力欄の下のスペース | 「Remember last search」チェックボックスを追加 |\n| 2 | 2. Change\
      \ the Search button color from blue to green. | Searchボタン | ボタンの色を青色から緑色に変更 |\n| 3 | 3. Add a CSV export button on the\
      \ results table top-right corner. | 結果テーブルの右上角（ヘッダー行の右端） | CSVエクスポートボタンを追加 |\n| 4 | 4. Show 20 items per page instead\
      \ of the current 10. | ページネーション | 1ページあたりの表示件数を現在の10件から20件に変更 |\n\n## Step 3: 変更が適用された後の画面の姿\n\n検索エリアでは、緑色になった検索ボタンと、その下に前回の検索を記憶するためのチェックボックスが配置され、利便性が向上します。検索結果エリアでは、テーブルの右上にCSVエクスポートボタンが追加され、さらに1ページあたりのデータ表示件数が10件から20件に拡張されて、より多くの情報が一度に閲覧できるようになります。"
