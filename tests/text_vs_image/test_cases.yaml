  descriptions:
    generic: "提供された画像（システムアーキテクチャ図）について、ご指定の条件に従って構造的に詳細に記述します。\n\n---\n\n### 1. テキスト内容（OCR）\n\n画像内に含まれるすべてのテキストを領域ごとに書き出します。\n\
      \n**ヘッダー部分**\n*   Production Architecture — AWS Multi-AZ\n*   Environment: prod • Region: ap-northeast-1\n\n**外部 / グローバルノード（上部および右側）**\n\
      *   Route 53 DNS\n*   CloudFront CDN\n*   S3 Static Assets\n*   IAM Roles\n*   CloudWatch Logs/Metrics\n*   origin （CloudFrontからS3への矢印上）\n\
      *   HTTPS （CloudFrontからVPC方向への矢印付近）\n\n**VPC・AZ境界のラベル**\n*   VPC: 10.0.0.0/16\n*   AZ-a (ap-northeast-1a)\n*   AZ-b\
      \ (ap-northeast-1c)\n*   Outbound （NAT GW上部の矢印付近）\n\n**AZ-a 内部のテキスト**\n*   Public Subnet\n*   ALB (AZ-a)\n*   NAT GW\
      \ (AZ-a)\n*   Private Subnet (App)\n*   ECS Fargate App Service (AZ-a)\n*   GET/SET （ECSからElastiCacheへの矢印上）\n*   ElastiCache\
      \ Redis\n*   DB Subnet\n*   write （ECSからRDSへの矢印上）\n*   RDS PostgreSQL Primary\n\n**AZ-b 内部のテキスト**\n*   Public Subnet\n\
      *   ALB (AZ-b)\n*   NAT GW (AZ-b)\n*   Private Subnet (App)\n*   ECS Fargate App Service (AZ-b)\n*   ElastiCache Redis\n\
      *   DB Subnet\n*   read-only （ECSからRDSへの矢印上）\n*   RDS PostgreSQL Read Replica\n\n**凡例（下部）**\n*   Public Subnet\n*  \
      \ Private Subnet (App)\n*   DB Subnet\n*   External / DNS\n*   Cache\n\n---\n\n### 2. 図表・ダイアグラムの構造（ノード・接続・階層）\n\n図は階層的な境界線（ボックス）を用いて、ネットワークの分離とコンポーネントの配置を示しています。\n\
      \n#### 【階層構造】\n1.  **VPC外（外部リソース）:** Route 53, CloudFront, S3, IAM Roles, CloudWatch Logs/Metrics\n2.  **VPCレベル:** 紫色の破線で囲まれた最大の領域。この中に2つのAZが含まれる。\n\
      3.  **AZレベル:** 「AZ-a」と「AZ-b」という2つの青緑色の破線で囲まれた領域が左右に並列に配置されている。\n4.  **サブネットレベル:** 各AZ内に、上から下へ3つのサブネット（Public, Private,\
      \ DB）が配置されている。\n5.  **ノードレベル:** 各サブネット内に特定のリソースが配置されている。\n\n#### 【ノードの配置】\n*   **外部（上部）:** 左から「Route 53 DNS」、「CloudFront\
      \ CDN」、「S3 Static Assets」。\n*   **外部（右側）:** 上から「IAM Roles」、「CloudWatch Logs/Metrics」。\n*   **AZ-a（左側）:**\n    *   Public\
      \ Subnet内: 「ALB (AZ-a)」、「NAT GW (AZ-a)」\n    *   Private Subnet内: 「ECS Fargate App Service (AZ-a)」、「ElastiCache Redis」\n\
      \    *   DB Subnet内: 「RDS PostgreSQL Primary」\n*   **AZ-b（右側）:**\n    *   Public Subnet内: 「ALB (AZ-b)」、「NAT GW (AZ-b)」\n\
      \    *   Private Subnet内: 「ECS Fargate App Service (AZ-b)」、「ElastiCache Redis」\n    *   DB Subnet内: 「RDS PostgreSQL\
      \ Read Replica」\n\n#### 【接続（矢印のフロー）】\n*   **外部から内部へのフロー:**\n    *   Route 53 → CloudFront （黒い実線矢印）\n    *   CloudFront\
      \ → S3 （黒い実線矢印、「origin」ラベル）\n    *   CloudFront → ALB (AZ-a) （黒い実線矢印）\n    *   CloudFront → ALB (AZ-b) （黒い実線矢印）\n* \
      \  **AZ内のフロー（AZ-a / AZ-b 共通）:**\n    *   ALB → ECS Fargate （黒い実線矢印）\n    *   ECS Fargate → NAT GW （細く薄いグレーの実線矢印）\n \
      \   *   NAT GW → 上方向（VPC外）へ向かう矢印（AZ-a側には「Outbound」ラベルあり）\n    *   ECS Fargate → ElastiCache Redis （黒い実線矢印、AZ-a側には「GET/SET」ラベルあり）\n\
      *   **DBへのフロー（クロスAZを含む）:**\n    *   ECS Fargate (AZ-a) → RDS Primary （緑色の実線矢印、「write」ラベル）\n    *   ECS Fargate (AZ-b)\
      \ → RDS Primary （緑色の実線矢印）\n    *   ECS Fargate (AZ-b) → RDS Read Replica （太い青色の実線矢印、「read-only」ラベル）\n*   **管理/監視系へのフロー:**\n\
      \    *   VPC内の各主要コンポーネント（ALB, NAT GW, ECS）から、右側の「IAM Roles」および「CloudWatch Logs/Metrics」へ向かって、非常に薄いグレーの線（実線および破線）が多数接続されている。\n\
      \n---\n\n### 3. 色とレイアウト\n\n図は視覚的な区別のために一貫したカラーコードとレイアウトを採用しています。\n\n#### 【レイアウト】\n*   **全体配置:** 全体的に左右対称（シンメトリー）に近いレイアウト。左半分がAZ-a、右半分がAZ-bの構成。\n\
      *   **データフローの方向:** 基本的に上から下（外部から内部ネットワークへ）へ向かってリクエストが流れるように描画されている。\n\n#### 【カラーリング（境界線と背景）】\n*   **VPC境界:** 紫色の太い破線。\n\
      *   **AZ境界:** 青緑色の破線。\n*   **Public Subnet:** 薄い青色の背景、青色の実線枠。\n*   **Private Subnet (App):** 薄い黄色/オレンジの背景、黄色の実線枠。\n\
      *   **DB Subnet:** 薄い緑色の背景、緑色の実線枠。\n\n#### 【カラーリング（ノード・凡例に基づく）】\n*   **Route 53 DNS (External/DNS):** 薄い紫色\n*   **CloudFront\
      \ CDN:** 黄色（マスタードイエロー）\n*   **S3 Static Assets:** 薄い緑/青緑色\n*   **ALB / NAT GW:** 薄い黄色（クリーム色）\n*   **ECS Fargate:** 薄いオレンジ/ピーチ色\n\
      *   **ElastiCache Redis (Cache):** 薄いピンク色\n*   **RDS PostgreSQL:** 鮮やかな薄緑色\n*   **IAM Roles / CloudWatch:** 薄いピンク紫色\n\
      \n---\n\n### 4. 主要な視覚要素\n\n*   **図形の形状:**\n    *   RDS（データベース）ノードのみ、データストレージを示す一般的な**円柱形（シリンダー）**のアイコンが使用されている。\n  \
      \  *   S3ノードのみ、角の尖った**長方形**が使用されている。\n    *   それ以外のすべてのノード（Route 53, CloudFront, ALB, NAT GW, ECS, ElastiCache, IAM,\
      \ CloudWatch）は、**角丸長方形**で統一されている。\n*   **ドロップシャドウ効果:** すべてのノード（角丸長方形、長方形、円柱）には、右下に黒いドロップシャドウ（影）が適用されており、背景のサブネット境界線から浮き出して見える立体的な表現がなされている。\n\
      *   **線の太さと色による強調:**\n    *   データの書き込み（write）は緑色の線、読み取り専用（read-only）は太い青色の線で視覚的に区別されている。\n    *   権限（IAM）やログ・メトリクス（CloudWatch）への接続線は、メインのデータフローの邪魔にならないように、意図的に非常に薄く細いグレーの線で描かれている。\n\
      *   **凡例（Legend）:** 画像の最下部に、四角いカラーボックスとテキストのペアが並んでおり、サブネットの背景色や一部のノードの役割を説明している。横長の枠で囲まれている。"
    specialized: "ご提示いただいたシステム構成図を分析し、指定されたフォーマットで構造化しました。\n\n## Mermaid 表記\n\n```mermaid\nflowchart TB\n    route53(\"Route\
      \ 53<br>DNS\")\n    cloudfront(\"CloudFront<br>CDN\")\n    s3[\"S3<br>Static Assets\"]\n    \n    iam(\"IAM<br>Roles\"\
      )\n    cloudwatch(\"CloudWatch<br>Logs/Metrics\")\n    outbound((\"Internet\"))\n\n    route53 --> cloudfront\n    cloudfront\
      \ -- \"origin\" --> s3\n\n    subgraph VPC [\"VPC: 10.0.0.0/16\"]\n        subgraph AZ_A [\"AZ-a (ap-northeast-1a)\"\
      ]\n            subgraph Pub_A [\"Public Subnet\"]\n                alb_a(\"ALB<br>(AZ-a)\")\n                nat_a(\"\
      NAT GW<br>(AZ-a)\")\n            end\n            subgraph Priv_A [\"Private Subnet (App)\"]\n                ecs_a(\"\
      ECS Fargate<br>App Service<br>(AZ-a)\")\n                redis_a(\"ElastiCache<br>Redis\")\n            end\n      \
      \      subgraph DB_A [\"DB Subnet\"]\n                rds_primary[(\"RDS PostgreSQL<br>Primary\")]\n            end\n\
      \        end\n\n        subgraph AZ_B [\"AZ-b (ap-northeast-1c)\"]\n            subgraph Pub_B [\"Public Subnet\"]\n\
      \                alb_b(\"ALB<br>(AZ-b)\")\n                nat_b(\"NAT GW<br>(AZ-b)\")\n            end\n          \
      \  subgraph Priv_B [\"Private Subnet (App)\"]\n                ecs_b(\"ECS Fargate<br>App Service<br>(AZ-b)\")\n   \
      \             redis_b(\"ElastiCache<br>Redis\")\n            end\n            subgraph DB_B [\"DB Subnet\"]\n      \
      \          rds_replica[(\"RDS PostgreSQL<br>Read Replica\")]\n            end\n        end\n    end\n\n    cloudfront\
      \ -- \"HTTPS\" --> alb_a\n    cloudfront --> alb_b\n\n    alb_a --> ecs_a\n    alb_b --> ecs_b\n\n    ecs_a -- \"GET/SET\"\
      \ --> redis_a\n    ecs_b --> redis_b\n\n    ecs_a -- \"write\" --> rds_primary\n    ecs_a --> rds_replica\n    ecs_b\
