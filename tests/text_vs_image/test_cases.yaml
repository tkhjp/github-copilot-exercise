- id: tc02
  title: UI 変更要求 (RFP)
  image: tests/text_vs_image/images/02_ui_change.png
  image_type: ui_change_request
  specialized_prompt: prompts/ui_change.md
  question: 'この画像は既存の UI モックアップに変更要求の吹き出しが書き込まれたものです。現在の画面要素と、各変更要求が「何を」「どう変えようとしているか」を対応づけて教えてください。

    '
  ground_truth_facts:
  - id: f01
    text: ドキュメントタイトルは 'UI Change Request — ShopApp Product Search'
  - id: f02
    text: アプリ名は 'ShopApp'
  - id: f03
    text: 画面の右上に 'Login' ボタンがある
  - id: f04
    text: 検索バー (text input) が存在する
  - id: f05
    text: '''Search'' ボタンがあり、現在は青色'
  - id: f06
    text: サイドバーにフィルター (Filters) セクションがある
  - id: f07
    text: カテゴリチェックボックスは 3 つ (Electronics, Books, Clothing)
  - id: f08
    text: 価格レンジスライダーがある (¥0 - ¥50,000)
  - id: f09
    text: 結果テーブルの列は Product, Price, Stock の 3 列
  - id: f10
    text: 結果テーブルには少なくとも 3 行のデータがある
  - id: f11
    text: ページネーション (< 1 2 3 >) がある
  - id: f12
    text: '変更要求 1: ''Remember last search'' チェックボックスを検索バー近くに追加'
  - id: f13
    text: '変更要求 2: Search ボタンの色を青から緑に変更'
  - id: f14
    text: '変更要求 3: 結果テーブルの右上に CSV エクスポートボタンを追加'
  - id: f15
    text: '変更要求 4: 1 ページあたり 20 件表示に変更'
  - id: f16
    text: 変更要求 1 の吹き出しは検索バー領域を指している
  - id: f17
    text: 変更要求 2 の吹き出しは Search ボタンを指している
  - id: f18
    text: 変更要求 3 の吹き出しは結果テーブルを指している
  - id: f19
    text: 変更要求 4 の吹き出しはページネーション領域を指している
  - id: f20
    text: 凡例に 'Red = change request, Gray = existing UI' と記載
  descriptions:
    generic: "画像から直接読み取れる構造的な情報を以下に詳細に記述します。\n\n### 1. テキスト内容\n画像内に含まれるテキストを上から下、左から右の順に記載します。\n\n**ヘッダー・メタ情報**\n*   UI Change\
      \ Request — ShopApp Product Search\n*   Reviewer: PM / Design — 2026-04-10\n\n**UIモックアップ部 (左側)**\n*   **トップバー:** ShopApp,\
      \ Login\n*   **検索エリア:** Search products..., Search\n*   **サイドバー (Filters):**\n    *   Filters\n    *   Electronics\n\
      \    *   Books\n    *   Clothing\n    *   Price range\n    *   ¥0 - ¥50,000\n*   **メインテーブル:**\n    *   Product, Price,\
      \ Stock (列ヘッダー)\n    *   Wireless Headphones, ¥12,800, 42\n    *   USB-C Hub (7-in-1), ¥4,500, 118\n    *   Mech. Keyboard,\
      \ ¥15,200, 7\n*   **ページネーション:** <, 1, 2, 3, >\n\n**注釈ボックス部 (右側・赤枠内)**\n*   1. Add a \"Remember last search\" checkbox\
      \ below the search bar.\n*   2. Change the Search button color from blue to green.\n*   3. Add a CSV export button on\
      \ the results table top-right corner.\n*   4. Show 20 items per page instead of the current 10.\n\n**凡例部 (右下・黄背景枠内)**\n\
      *   Legend\n*   Red = change request\n*   Gray = existing UI\n\n---\n\n### 2. 図表・ダイアグラムの構造\nこの画像は、左側の「UIモックアップ」に対して、右側の「変更要求（注釈ボックス）」が赤い矢印で紐付けられている構造（ダイアグラム）になっています。\n\
      \n**ノード（要素）と接続（矢印）の対応関係:**\n*   **接続1:** 注釈ボックス「1. Add a...」の左端付近から、UIモックアップ内の**「Search products...」入力枠の左下の余白**へ向かって赤い矢印が伸びています。\n\
      *   **接続2:** 注釈ボックス「2. Change the...」の左端付近から、UIモックアップ内の**青い「Search」ボタン**へ向かって赤い矢印が伸びています。\n*   **接続3:** 注釈ボックス「3. Add\
      \ a...」の左端付近から、UIモックアップ内の**データテーブルの右上（「Stock」列の右側の余白）**へ向かって赤い矢印が伸びています。\n*   **接続4:** 注釈ボックス「4. Show 20...」の左端付近から、UIモックアップ内の**ページネーションの「2」と「3」のボタンの間の余白**へ向かって赤い矢印が伸びています。\n\
      \n**UI要素の階層構造:**\n全体を囲む大きなグレーの枠の中に、以下の階層で要素が配置されています。\n*   上部：ダークブルーのナビゲーションバー\n*   中部上：検索バーと検索ボタン\n*   中部下：左右に分割\n\
      \    *   左ペイン：フィルター項目（チェックボックス群、スライダー）を含むボックス\n    *   右ペイン：データテーブル\n*   下部：ページネーションコントロール\n\n---\n\n### 3. 色とレイアウト\n\
      **レイアウト:**\n*   画面の最上部にタイトルとメタ情報があり、細い水平線で区切られています。\n*   画面は大きく左右に分割されており、左側の約65%の領域にUIモックアップ（グレーの枠で囲まれている）が配置されています。\n\
      *   右側の約35%の領域に、4つの赤い注釈ボックスが縦に等間隔に配置されています。\n*   画面の右下隅に凡例ボックスが配置されています。\n\n**色:**\n*   **背景:** 全体的に白（無地）。\n*   **UI枠線・区切り線:**\
      \ 薄いグレー。\n*   **トップバー:** 背景はダークブルー。テキストは白。\n*   **「Search」ボタン:** 背景は青。テキストは白。\n*   **サイドバー (Filters):** 背景は非常に薄いグレー。\n\
      *   **テーブルヘッダー行:** 背景は薄いグレー。\n*   **スライダーのつまみと選択範囲:** 青。\n*   **ページネーションの「1」:** 背景は青。テキストは白。それ以外のボタンは白背景にグレー枠。\n*  \
      \ **注釈ボックス・テキスト・矢印:** 全て濃い赤色。\n*   **凡例ボックス:** 背景は薄い黄色。枠線は茶色。\n\n---\n\n### 4. 主要な視覚要素\n画像内で視覚的に識別できる主要な要素（コンポーネント・グラフィック）は以下の通りです。\n\
      \n*   **入力フィールド:** プレースホルダーテキストを含む長方形の検索枠。\n*   **ボタン:**\n    *   枠線のみのボタン（「Login」）\n    *   塗りつぶしボタン（「Search」）\n  \
      \  *   小さな四角いボタン群（ページネーションの「<」「1」「2」「3」「>」）\n*   **チェックボックス:** 「Electronics」「Books」「Clothing」の横にある3つの四角いアイコン。\n*   **スライダーコントロール:**\
      \ 横線の上に2つの青い円形のつまみがあるUIパーツ。\n*   **データテーブル:** 列名（太字）と3行のデータセルを持つ表組み。薄いグレーの横線で区切られている。\n*   **注釈ボックス (Callout):** 赤い枠線で囲まれた4つの四角形。\n\
      *   **指示矢印:** 赤い実線で描かれた4本の矢印（先端が三角形）。\n*   **凡例 (Legend):** 黄色い背景の四角形内に、赤い短い水平線と、グレーの枠線の正方形が描画されている。"
    specialized: 'ご指示いただいた3つのステップに従って、画像から情報を抽出・整理しました。


      ## Step 1: 現在の UI 画面要素の列挙


      - **Header**: ロゴ名「ShopApp」、ボタン種類「Login」ボタン

      - **Search**: 入力欄（"Search products..."のプレースホルダー）、ボタン「Search」（現在は青色）

      - **Filters**: 見出し「Filters」、チェックボックス（Electronics, Books, Clothing）、スライダー「Price range」（¥0 - ¥50,000）

      - **Results**: テーブルの列名「Product, Price, Stock」、行数は現在3行（Wireless Headphones, USB-C Hub (7-in-1), Mech. Keyboard）

      - **Pagination**: 「<」「1」「2」「3」「>」のボタン（「1」が現在青色でアクティブ状態）


      ## Step 2: 変更要求の抽出


      | # | 吹き出し内のテキスト | 対象 UI 要素 | 変更内容 |

      |---|---|---|---|

      | 1 | 1. Add a "Remember last search" checkbox below the search bar. | Search 入力欄の下の余白 | 「Remember last search」というチェックボックスを追加
      |

      | 2 | 2. Change the Search button color from blue to green. | Search ボタン | ボタンの色を青色から緑色に変更 |

      | 3 | 3. Add a CSV export button on the results table top-right corner. | 結果テーブルの右上角 | CSV エクスポートボタンを追加 |

      | 4 | 4. Show 20 items per page instead of the current 10. | ページネーション（「2」のボタン付近） | 1ページあたりの表示件数を現在の10件から20件に変更 |


      ## Step 3: 変更が適用された後の画面の姿


      検索エリアでは「Search」ボタンが緑色になり、検索バーのすぐ下に「Remember last search」のチェックボックスが新たに配置されます。また、検索結果のテーブル右上にはCSV出力用のボタンが追加され、1ページあたりの商品表示件数が20件に増えることで、一度に一覧できる情報量が多くなる画面へと変化します。'
