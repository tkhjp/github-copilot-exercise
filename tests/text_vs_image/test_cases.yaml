    gemini_3_flash:
      generic: "ご指定いただいた画像の構造的な記述は以下の通りです。\n\n### 1. テキスト内容 (OCR)\n\n画像内に含まれる全てのテキストを機能別に書き出します。\n\n*   **最上部タイトル・メタデータ:**\n\
        \    *   UI Change Request — ShopApp Product Search\n    *   Reviewer: PM / Design — 2026-04-10\n*   **アプリUI内（ヘッダー）:**\n\
        \    *   ShopApp\n    *   Login\n*   **アプリUI内（検索バー）:**\n    *   Search products...（プレースホルダー）\n    *   Search（ボタン）\n\
        *   **アプリUI内（左サイドバー：Filters）:**\n    *   Filters\n    *   Electronics\n    *   Books\n    *   Clothing\n    *   Price\
        \ range\n    *   ¥0 - ¥50,000\n*   **アプリUI内（検索結果テーブル）:**\n    *   Product / Price / Stock\n    *   Wireless Headphones\
        \ / ¥12,800 / 42\n    *   USB-C Hub (7-in-1) / ¥4,500 / 118\n    *   Mech. Keyboard / ¥15,200 / 7\n*   **アプリUI内（ページネーション）:**\n\
        \    *   <\n    *   1\n    *   2\n    *   3\n    *   >\n*   **変更要求（右側の赤枠内の指示）:**\n    1.  Add a \"Remember last search\"\
        \ checkbox below the search bar.\n    2.  Change the Search button color from blue to green.\n    3.  Add a CSV export\
        \ button on the results table top-right corner.\n    4.  Show 20 items per page instead of the current 10.\n*   **凡例\
        \ (Legend):**\n    *   Legend\n    *   Red = change request\n    *   Gray = existing UI\n\n---\n\n### 2. 図表・ダイアグラムの構造\n\
        \nこの画像は「既存のUIモックアップ」に対して「修正指示」を重ねた構造になっています。\n\n*   **階層構造:**\n    *   **ベースレイヤー:** UIモックアップ本体。\n        *   **最上部:**\
        \ ダークカラーのヘッダーバー。\n        *   **中央上部:** 検索入力フィールドと検索ボタン。\n        *   **中央下部（2カラム構成）:**\n            *   左カラム：フィルター（チェックボックス、スライダー）。\n\
        \            *   右カラム：データテーブルとページネーション。\n    *   **オーバーレイレイヤー:** 赤色の注釈要素。\n        *   右側に垂直に並んだ4つのテキストボックス。\n   \
        \     *   各ボックスからUIの特定箇所を指し示す矢印。\n*   **接続（指示と対象）:**\n    *   指示1のボックス → 検索バーのすぐ下の空白エリア。\n    *   指示2のボックス → 「Search」ボタン。\n\
        \    *   指示3のボックス → テーブルのヘッダー右端。\n    *   指示4のボックス → ページネーションの数値エリア。\n\n---\n\n### 3. 色とレイアウト\n\n*   **色構成:**\n  \
        \  *   **UIヘッダー:** ダークネイビー（濃紺）。\n    *   **主要ボタン・アクティブ要素:** 青（Searchボタン、ページネーションの「1」）。\n    *   **既存UIの境界線・背景:** グレー系。\n\
        \    *   **注釈（変更要求）:** 赤（テキスト、枠線、矢印）。\n    *   **凡例ボックス:** 背景は非常に薄い黄色、枠線は黄土色。\n*   **レイアウト:**\n    *   左側にUIの全体像を配置し、右側にその修正内容を説明するテキストボックスを並べた、ドキュメント形式のレイアウトです。\n\
        \    *   全体は白いキャンバス上に配置されています。\n\n---\n\n### 4. 主要な視覚要素\n\n*   **UIコンポーネント:**\n    *   テキスト入力フィールド（検索窓）。\n    *  \
        \ ボタン（Search, Login, ページネーション）。\n    *   チェックボックス（Filters内）。\n    *   レンジスライダー（Price range内、両端に青いドット）。\n    *   データテーブル（3列のグリッド形式）。\n\
        *   **注釈グラフィック:**\n    *   **赤枠:** 指示内容を囲む長方形。\n    *   **赤矢印:** 指示対象を特定するための細い線。\n*   **凡例（Legend）内の図形:**\n    *\
        \   赤い水平線（change requestを示す記号）。\n    *   グレーの枠線の正方形（existing UIを示す記号）。"
      specialized: 'ご提示いただいた画像に基づき、UI変更要求の内容を以下の3段階で整理・抽出します。


        ## Step 1: 現在の UI 画面要素の列挙

        赤色の吹き出しを除いた、元の画面の構成要素は以下の通りです。


        *   **Header**: ロゴ名「ShopApp」、ボタン種類「Login」

        *   **Search**: 入力欄（プレースホルダー「Search products...」）、ボタン（現在の色：青）

        *   **Filters**: サイドバーに「Electronics」「Books」「Clothing」の各チェックボックス、および「Price range」のスライダー（¥0 - ¥50,000）

        *   **Results**: テーブルの列名（Product, Price, Stock）、および 3 行の商品データ

        *   **Pagination**: ページャの現在の状態（「<」「1」「2」「3」「>」のボタン、1ページ目が青色でアクティブ）


        ## Step 2: 変更要求の抽出


        | # | 吹き出し内のテキスト | 対象 UI 要素 | 変更内容 |

        |---|---|---|---|

        | 1 | Add a "Remember last search" checkbox below the search bar. | 検索入力欄の下のエリア | チェックボックスの新規追加 |

        | 2 | Change the Search button color from blue to green. | Search ボタン | 色の変更（青色から緑色へ） |

        | 3 | Add a CSV export button on the results table top-right corner. | 商品結果テーブルの右上隅 | ボタンの新規追加 |

        | 4 | Show 20 items per page instead of the current 10. | ページネーション（表示ロジック） | 1ページあたりの表示件数の変更（10件から20件へ） |


        ## Step 3: 変更が適用された後の画面の姿

        検索ボタンが緑色に変更され、その直下に検索条件を保持するためのチェックボックスが配置されることで、検索機能の視認性と利便性が向上します。また、結果テーブルにはCSV出力機能が追加され、1ページあたりの表示件数が20件に倍増することで、より多くの情報を効率的に閲覧できる画面へと更新されます。'
