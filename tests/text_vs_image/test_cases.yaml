      \    *   `Database` / `(PostgreSQL)`\n    *   `Cache` / `(Redis)`\n*   **矢印（エッジ）に付随するラベル**:\n    *   `HTTPS`\n    *\
      \   `SQL`\n    *   `GET/SET`\n*   **凡例（左下）**:\n    *   `Legend: blue=client, yellow=api, green=db, red=cache`\n\n###\
      \ 2. 図表・ダイアグラムの構造\nこの図は、4つのノード（構成要素）とそれらを繋ぐ3つの有向エッジ（矢印）で構成されるフロー図またはアーキテクチャ図です。\n\n*   **階層とフロー**: 全体として左から右への流れ（依存関係またはデータフロー）を示しています。中央の「API\
      \ Server」をハブとして、右側で2つに分岐する構造です。\n*   **ノードと接続関係**:\n    1.  **始点**: `Web Client (Browser)` ノードから `API Server (FastAPI)`\
      \ ノードへ、右向きの矢印が接続されています。この矢印の上部には `HTTPS` というラベルがあります。\n    2.  **分岐1（右上）**: `API Server (FastAPI)` ノードから `Database (PostgreSQL)`\
      \ ノードへ、右上に向かう斜めの矢印が接続されています。この矢印の近くには `SQL` というラベルがあります。\n    3.  **分岐2（右下）**: `API Server (FastAPI)` ノードから `Cache (Redis)`\
      \ ノードへ、右下に向かう斜めの矢印が接続されています。この矢印の近くには `GET/SET` というラベルがあります。\n\n### 3. 色とレイアウト\n*   **背景色**: 白。\n*   **テキストの色**: タイトルとノード内のテキストは黒。矢印のラベル（HTTPS,\
      \ SQL, GET/SET）と左下の凡例はグレー。\n*   **ノードの色と凡例との対応**: 各ノードは黒い実線の枠線で囲まれ、異なる色で塗りつぶされています。これらは左下の凡例と対応しています。\n    *   `Web\
      \ Client`: 薄い青色（blue）\n    *   `API Server`: 薄い黄色（yellow）\n    *   `Database`: 薄い緑色（green）\n    *   `Cache`: 薄い赤色/ピンク色（red）\n\
      *   **レイアウト（配置）**:\n    *   左側にクライアント要素、中央にAPIサーバー、右側の上下にデータストア要素が配置されています。\n    *   タイトルは左上に左揃えで配置。\n    *   凡例は左下に左揃えで配置（フォントサイズは他より小さい）。\n\
      \    *   ノード内のテキストはすべて中央揃え（センタリング）されています。\n\n### 4. 主要な視覚要素\n*   **図形の形状**:\n    *   **長方形**: `Web Client`、`API Server`、`Cache`\
      \ の3つのノードは単純な長方形です。\n    *   **円柱形**: `Database` ノードのみ、データストレージを一般的に表す円柱（立体的なドラム缶）の形状をしています。上部に楕円形が描かれ、立体感を表現しています。\n\
      *   **矢印**:\n    *   すべて黒い実線の直線です。\n    *   先端には塗りつぶされた黒い三角形の矢尻がついています。\n    *   矢印は各図形の枠線から出発し、目的の図形の枠線に到達しています。"
