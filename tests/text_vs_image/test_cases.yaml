test_cases:
- id: tc01
  title: 混合スライド (Flow + Chart + Table + Code)
  image: tests/text_vs_image/images/01_mixed_slide.png
  image_type: mixed_slide
  test_type: extraction
  specialized_prompt: prompts/mixed_slide.md
  question: 'このスライドに含まれる情報をすべて教えてください。フローチャートの各ステップ、棒グラフの月別値、地域別売上テーブルの Tokyo の Mar と Total、コード中の関数シグネチャ、フッター注釈を具体的に挙げてください。

    '
  ground_truth_facts:
  - id: f01
    text: タイトルは '2026 Q1 Operations Overview'
  - id: f02
    text: サブタイトルは 'Revenue, Fulfillment, and Metrics'
  - id: f03
    text: フローチャートのセクション見出しは 'Order Flow'
  - id: f04
    text: フローは 3 ステップ (Receive Order → Validate Payment → Ship Product)
  - id: f05
    text: フローの矢印は左→右の単方向
  - id: f06
    text: 棒グラフのセクション見出しは 'Monthly Revenue (MJPY)'
  - id: f07
    text: Jan の値は 120
  - id: f08
    text: Feb の値は 85
  - id: f09
    text: Mar の値は 160
  - id: f10
    text: Apr の値は 140
  - id: f11
    text: Mar の棒だけ色が異なる (オレンジ系)
  - id: f12
    text: テーブルのセクション見出しは 'Regional Sales (MJPY)'
  - id: f13
    text: テーブルは 5 列 (Region, Jan, Feb, Mar, Total)
  - id: f14
    text: テーブルは 4 行 (Tokyo, Osaka, Nagoya, Fukuoka)
  - id: f15
    text: Tokyo の Mar の値は 160
  - id: f16
    text: Tokyo の Total の値は 365
  - id: f17
    text: Fukuoka の Total の値は 150
  - id: f18
    text: コードのファイル名は 'quarterly_total.py'
  - id: f19
    text: 関数名は 'quarterly_total'
  - id: f20
    text: '引数は ''region: str'''
  - id: f21
    text: 戻り値型注釈は '-> int'
  - id: f22
    text: コードは 'data = SALES[region]' を含む
  - id: f23
    text: 'フッター注釈に ''Q1 total revenue: 975 million JPY'' と記載'
  - id: f24
    text: フッター注釈に 'Mar was the strongest month' と記載
  descriptions:
    gemini_3_flash:
      generic: "ご提示いただいた画像の構造的な記述は以下の通りです。\n\n### 1. テキスト内容 (OCR)\n\n*   **ヘッダー部:**\n    *   2026 Q1 Operations Overview\n\
        \    *   Revenue, Fulfillment, and Metrics\n*   **左上セクション (Order Flow):**\n    *   Order Flow\n    *   Receive Order\n\
        \    *   Validate Payment\n    *   Ship Product\n*   **右上セクション (Monthly Revenue):**\n    *   Monthly Revenue (MJPY)\n\
        \    *   120, 85, 160, 140 (グラフ上の数値)\n    *   Jan, Feb, Mar, Apr (X軸)\n*   **左下セクション (Regional Sales):**\n    *  \
        \ Regional Sales (MJPY)\n    *   表ヘッダー: Region, Jan, Feb, Mar, Total\n    *   Tokyo: 120, 85, 160, 365\n    *   Osaka:\
        \ 90, 70, 110, 270\n    *   Nagoya: 60, 55, 75, 190\n    *   Fukuoka: 45, 40, 65, 150\n*   **右下セクション (Code Block):**\n\
        \    *   quarterly_total.py\n    *   ```python\n        def quarterly_total(region: str) -> int:\n            \"\"\
        \"Sum Jan+Feb+Mar for one region.\"\"\"\n            data = SALES[region]\n            return data['Jan'] + data['Feb']\
        \ + data['Mar']\n\n        total = quarterly_total('Tokyo')\n        ```\n*   **フッター部:**\n    *   Q1 total revenue:\
        \ 975 million JPY. Mar was the strongest month across all regions.\n\n---\n\n### 2. 図表・ダイアグラムの構造\n\n*   **Order Flow\
        \ (フローチャート):**\n    *   **ノード:** 3つの角丸ではない長方形ボックス。\n    *   **接続:** 左から右へ、直線的な矢印で1列に繋がっている。\n    *   **階層:** 並列な処理ステップ（受信\
        \ → 検証 → 出荷）。\n*   **Monthly Revenue (棒グラフ):**\n    *   **軸:** L字型の黒い軸（Y軸に目盛り線や数字はなし、X軸に月名ラベル）。\n    *   **データ系列:**\
        \ 4本の垂直な棒。3月（Mar）のみ色が異なり、強調されている。\n*   **Regional Sales (表):**\n    *   **構造:** 5行×5列のグリッド形式。\n    *   **階層:** 1行目がヘッダー、1列目が地域名（Region）。右端の列が合計（Total）。\n\
        \n---\n\n### 3. 色とレイアウト\n\n*   **レイアウト全体:**\n    *   上部に青色のタイトルバー。\n    *   中央部は2×2のグリッド配置で4つの要素が並ぶ。\n    *   最下部に薄いグレーのフッターバー。\n\
        *   **配色:**\n    *   **メインカラー:** 青色（タイトルバー、グラフ、表のヘッダー）。\n    *   **アクセントカラー:** オレンジ色（グラフの3月の棒のみに使用）。\n    *   **フローチャートの塗り分け:**\
        \ 水色（Receive）、薄黄色（Validate）、薄緑色（Ship）。\n    *   **コードブロック:** 背景が黒（ダークモード風）。\n    *   **背景色:** 白。\n\n---\n\n### 4.\
        \ 主要な視覚要素\n\n*   **タイポグラフィ:**\n    *   タイトルは白のサンセリフ体、太字。\n    *   各セクションの見出しは黒の太字。\n    *   コード部分は等幅フォント（Monospace）を使用し、青や緑などの構文ハイライトが適用されている。\n\
        *   **グラフィック要素:**\n    *   各図表には外枠や境界線が明確に引かれている（表の罫線、フローのボックス枠など）。\n    *   棒グラフの各バーの上には、具体的な数値がテキストで配置されている。\n*\
        \   **シンボル:**\n    *   右向きの矢印（フローチャートの接続用）。"
      specialized: "ご提示いただいたスライド画像を解析し、すべての情報を指定の形式で抽出します。\n\n## Step 1: レイアウトの全体像\nスライドは以下の5つのセクションで構成されています。\n\n1.  **タイトルエリア（上部）**:\
        \ スライド全体のテーマとサブタイトル。\n2.  **Order Flow（左上）**: 業務プロセスを示すフローチャート。\n3.  **Monthly Revenue (MJPY)（右上）**: 月次売上の推移を示す棒グラフ。\n\
        4.  **Regional Sales (MJPY)（左下）**: 地域別の月次売上データを示す表。\n5.  **quarterly_total.py（右下）**: 売上集計ロジックを示すコードブロック。\n6.  **フッター（最下部）**:\
        \ 全体のサマリーテキスト。\n\n---\n\n## Step 2: 各セクションを専用形式で出力\n\n### フローチャート / プロセス図\n```mermaid\nflowchart LR\n    A[Receive\
        \ Order] --> B[Validate Payment] --> C[Ship Product]\n```\n\n### グラフ / チャート\n**タイトル**: Monthly Revenue (MJPY)\n**軸ラベル**:\
        \ X軸（月：Jan, Feb, Mar, Apr）、Y軸（数値ラベルのみ、単位MJPY）\n**最大値**: 160 (Mar)\n**最小値**: 85 (Feb)\n\n| ラベル | 値 | 単位 | 色・強調 |\n\
        |---|---|---|---|\n| Jan | 120 | MJPY | 青 |\n| Feb | 85 | MJPY | 青 |\n| Mar | 160 | MJPY | オレンジ（最大値） |\n| Apr | 140\
        \ | MJPY | 青 |\n\n### 表 (table)\n**タイトル**: Regional Sales (MJPY)\n\n| Region | Jan | Feb | Mar | Total |\n|---|---|---|---|---|\n\
        | Tokyo | 120 | 85 | 160 | 365 |\n| Osaka | 90 | 70 | 110 | 270 |\n| Nagoya | 60 | 55 | 75 | 190 |\n| Fukuoka | 45\
        \ | 40 | 65 | 150 |\n\n### コード\n**ファイル名**: quarterly_total.py\n```python\ndef quarterly_total(region: str) -> int:\n\
        \    \"\"\"Sum Jan+Feb+Mar for one region.\"\"\"\n    data = SALES[region]\n    return data['Jan'] + data['Feb'] +\
        \ data['Mar']\n\ntotal = quarterly_total('Tokyo')\n```\n\n### 本文テキスト / 注釈\n- **メインタイトル**: 2026 Q1 Operations Overview\n\
        - **サブタイトル**: Revenue, Fulfillment, and Metrics\n- **フッターテキスト**: Q1 total revenue: 975 million JPY. Mar was the strongest\
        \ month across all regions.\n\n---\n\n## Step 3: 全体の主張\n2026年第1四半期の業務概要として、注文から出荷までのフローと地域別・月別の売上実績を示しており、第1四半期の総売上9億7,500万円のうち、3月が全地域で最も高いパフォーマンスを記録したことを報告しています。"
    gemini_31_flash_lite:
      generic: "ご提示いただいた画像は、ビジネスダッシュボードのような構成で、業務フロー、月次収益、地域別売上、およびPythonコードによる計算ロジックが示されています。詳細は以下の通りです。\n\n### 1. テキスト内容（OCR）\n\
        *   **ヘッダー:**\n    *   2026 Q1 Operations Overview\n    *   Revenue, Fulfillment, and Metrics\n*   **セクションタイトル:**\n\
        \    *   Order Flow\n    *   Monthly Revenue (MJPY)\n    *   Regional Sales (MJPY)\n    *   quarterly_total.py\n*\
        \   **テーブル内:**\n    *   Region, Jan, Feb, Mar, Total\n    *   Tokyo, 120, 85, 160, 365\n    *   Osaka, 90, 70, 110,\
        \ 270\n    *   Nagoya, 60, 55, 75, 190\n    *   Fukuoka, 45, 40, 65, 150\n*   **コードブロック内:**\n    *   def quarterly_total(region:\
        \ str) -> int:\n    *   \"\"\"Sum Jan+Feb+Mar for one region.\"\"\"\n    *   data = SALES[region]\n    *   return\
        \ data['Jan'] + data['Feb'] + data['Mar']\n    *   total = quarterly_total('Tokyo')\n*   **フッター:**\n    *   Q1 total\
        \ revenue: 975 million JPY. Mar was the strongest month across all regions.\n\n### 2. 図表・ダイアグラムの構造\n*   **フローチャート\
        \ (Order Flow):**\n    *   3つの長方形ノードが右向きの矢印で連結されている。\n    *   左から順に：「Receive Order」「Validate Payment」「Ship Product」。\n\
        *   **棒グラフ (Monthly Revenue):**\n    *   X軸：Jan, Feb, Mar, Apr\n    *   Y軸：値（軸線のみ表示）\n    *   データポイント：\n        *\
        \   Jan: 120 (青)\n        *   Feb: 85 (青)\n        *   Mar: 160 (オレンジ)\n        *   Apr: 140 (青)\n    *   棒の上に各数値がラベル表示されている。\n\
        *   **テーブル (Regional Sales):**\n    *   5行5列のグリッド形式。ヘッダー行と4つのデータ行（Tokyo, Osaka, Nagoya, Fukuoka）。\n\n### 3. 色とレイアウト\n\
        *   **レイアウト:** 上部にヘッダー、中央部に4つのセクション（左上：フローチャート、右上：棒グラフ、左下：テーブル、右下：コード）、下部にフッターを配置した2x2グリッド構成。\n*   **配色:**\n    *\
        \   ヘッダー・フッター：青い背景に白抜き文字。\n    *   フローチャート：ノードごとに異なる淡い色（水色、黄色、薄緑）。\n    *   棒グラフ：基本は青色だが、最も高い「Mar」のみ強調色としてオレンジが使用されている。\n\
        \    *   コードブロック：背景黒、文字は白・緑・青のシンタックスハイライト。\n\n### 4. 主要な視覚要素\n*   **フローチャート:** プロセスのステップを時系列で提示。\n*   **棒グラフ:** 月次収益の変化を視覚化。\n\
        *   **データテーブル:** 地域別および月別の詳細数値を整理。\n*   **コードスニペット:** データの集計ロジックを技術的に提示。\n*   **ハイライト:** グラフの「Mar」のバーが色分けされており、視覚的に重要であることが強調されている。"
      specialized: "## Step 1: レイアウトの全体像\n\nスライドは以下のセクションで構成されています。\n\n*   **ヘッダー**: タイトルとサブタイトル\n*   **左上セクション (Order Flow)**:\
        \ プロセスを示すフローチャート\n*   **右上セクション (Monthly Revenue)**: 月別の収益を示す棒グラフ\n*   **左下セクション (Regional Sales)**: 地域別の売上明細を示す表\n\
        *   **右下セクション (quarterly_total.py)**: 売上集計用のPythonコード\n*   **フッター**: 全体収益と分析結果に関する注釈テキスト\n\n---\n\n## Step 2: 各セクションを専用形式で出力\n\
        \n### フローチャート\n```mermaid\nflowchart LR\n    A[Receive<br>Order] --> B[Validate<br>Payment] --> C[Ship<br>Product]\n\
        ```\n\n### グラフ / チャート\n**タイトル**: Monthly Revenue (MJPY)\n\n| ラベル | 値 | 単位 | 色・強調 |\n|---|---|---|---|\n| Jan | 120\
        \ | MJPY | 青 |\n| Feb | 85 | MJPY | 青 |\n| Mar | 160 | MJPY | オレンジ |\n| Apr | 140 | MJPY | 青 |\n\n### 表 (table)\n\
        **タイトル**: Regional Sales (MJPY)\n\n| Region | Jan | Feb | Mar | Total |\n|---|---|---|---|---|\n| Tokyo | 120 | 85\
        \ | 160 | 365 |\n| Osaka | 90 | 70 | 110 | 270 |\n| Nagoya | 60 | 55 | 75 | 190 |\n| Fukuoka | 45 | 40 | 65 | 150\
        \ |\n\n### コード\n```python\ndef quarterly_total(region: str) -> int:\n    \"\"\"Sum Jan+Feb+Mar for one region.\"\"\
        \"\n    data = SALES[region]\n    return data['Jan'] + data['Feb'] + data['Mar']\n\ntotal = quarterly_total('Tokyo')\n\
        ```\n\n### 本文テキスト / 注釈\n*   **タイトル**: 2026 Q1 Operations Overview\n*   **サブタイトル**: Revenue, Fulfillment, and Metrics\n\
        *   **フッター注釈**: Q1 total revenue: 975 million JPY. Mar was the strongest month across all regions.\n\n---\n\n## Step\
        \ 3: 全体の主張\n2026年第1四半期の総売上は975百万JPYに達し、全地域を通じて3月が最も高い業績を記録しました。本スライドは、業務フローの確認と地域別の売上実績、およびそれらを計算するためのロジックを提示しています。"
