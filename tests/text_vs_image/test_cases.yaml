        \n**導入文**\n*   This chapter defines the non-functional requirements (NFRs) for the ShopApp e-commerce platform. These\
        \ requirements apply to the production environment running on AWS ap-northeast-1 and must be met before the GA release\
        \ scheduled for 2026-Q3.\n\n**セクション 3.1: Performance Requirements**\n*   見出し: 3.1 Performance Requirements\n*   本文:\
        \ All API endpoints must meet the following latency and throughput targets under normal operating conditions (defined\
        \ as < 80% CPU utilization across the ECS cluster).\n*   箇条書きリスト:\n    *   API response time (p95): <= 200 ms\n  \
        \  *   API response time (p99): <= 500 ms\n    *   Search query throughput: >= 500 requests/sec\n    *   Database\
        \ query timeout: 3 seconds (hard limit)\n    *   Page load time (LCP): <= 1.5 seconds on 4G network\n    *   Batch\
        \ processing (nightly): complete within 2 hours\n\n**セクション 3.2: Availability & Reliability**\n*   見出し: 3.2 Availability\
        \ & Reliability\n*   本文: The system must achieve the uptime and recovery targets listed below. Planned maintenance\
        \ windows (Sunday 02:00-06:00 JST) are excluded from the uptime calculation.\n\n**テーブル（表）の内容**\n*   列名: Requirement\
        \ | Target | Priority\n*   行1: Monthly uptime | >= 99.9% | Must\n*   行2: RTO (Recovery Time Objective) | <= 15 minutes\
        \ | Must\n*   行3: RPO (Recovery Point Objective) | <= 5 minutes | Must\n*   行4: Failover (AZ-level) | Automatic |\
        \ Should\n*   行5: Data backup retention | 90 days | Must\n\n**フッター**\n*   左側: Page 12\n*   右側: Last updated: 2026-03-15\n\
        \n---\n\n### 2. 図表・ダイアグラムの構造\n\n**階層構造**\n1.  **ドキュメントタイトル**: 最上位階層\n2.  **章 (Chapter 3)**: 第2階層\n3.  **セクション (3.1,\
        \ 3.2)**: 第3階層。各セクションは「説明文」と「詳細データ（リストまたは表）」で構成されている。\n\n**テーブル構造 (3.2項)**\n*   **形式**: 3列 × 6行（ヘッダー1行 + データ5行）のグリッド構造。\n\
        *   **項目間の関係**: 左列の「要件（Requirement）」に対し、中央列の「目標値（Target）」と右列の「優先度（Priority）」が定義されている。\n\n---\n\n### 3. 色とレイアウト\n\n\
        *   **全体のレイアウト**:\n    *   標準的なビジネス文書形式（ポートレート／縦向き）。\n    *   上部と下部にページ全体を区切る細い灰色の水平線（セパレーター）がある。\n    *   左揃えのテキスト配置。\n\
        *   **配色**:\n    *   **背景**: 白。\n    *   **テキスト**: 黒および濃いグレー。\n    *   **アクセントカラー**: テーブルのヘッダー行に濃い紺色（ダークブルー／チャコールグレー）を使用。\n\
        *   **テーブルのデザイン**:\n    *   ヘッダー行は背景が濃色、文字が白抜き。\n    *   データ行は白背景に細い灰色の境界線。\n\n---\n\n### 4. 主要な視覚要素\n\n*   **タイポグラフィ**:\n\
        \    *   サンセリフ体（Sans-serif）のフォントを使用。\n    *   見出しには太字（Bold）が適用され、階層に応じてフォントサイズが使い分けられている。\n*   **箇条書き**:\n    *  \
        \ 3.1項では、黒い丸（●）のブレットポイントを使用したリスト形式が採用されている。\n*   **区切り線**:\n    *   ヘッダーの下とフッターの上に、ページ全幅にわたる細い水平線が引かれている。\n*   **余白**:\n\
        \    *   各セクション間および、テキストと表・リストの間には一貫した垂直方向の余白が設けられている。"
      specialized: '```markdown

        <!-- ACME Corp.                                         Confidential — Draft v2.1 -->


        # System Requirements Specification


        ## Chapter 3: Non-Functional Requirements


        This chapter defines the non-functional requirements (NFRs) for the ShopApp e-commerce platform. These requirements
        apply to the production environment running on AWS ap-northeast-1 and must be met before the GA release scheduled
        for 2026-Q3.


        ### 3.1 Performance Requirements


        All API endpoints must meet the following latency and throughput targets under normal operating conditions (defined
        as < 80% CPU utilization across the ECS cluster).


        - API response time (p95): <= 200 ms

        - API response time (p99): <= 500 ms

        - Search query throughput: >= 500 requests/sec

        - Database query timeout: 3 seconds (hard limit)

        - Page load time (LCP): <= 1.5 seconds on 4G network

        - Batch processing (nightly): complete within 2 hours


        ### 3.2 Availability & Reliability


        The system must achieve the uptime and recovery targets listed below. Planned maintenance windows (Sunday 02:00-06:00
        JST) are excluded from the uptime calculation.


        | Requirement | Target | Priority |

        |---|---|---|

        | Monthly uptime | >= 99.9% | Must |

        | RTO (Recovery Time Objective) | <= 15 minutes | Must |

        | RPO (Recovery Point Objective) | <= 5 minutes | Must |

        | Failover (AZ-level) | Automatic | Should |

        | Data backup retention | 90 days | Must |


        <!-- Page 12                                           Last updated: 2026-03-15 -->

        ```'
