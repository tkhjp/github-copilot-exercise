- id: tc03
  title: 複雑クラウドアーキテクチャ (AWS Multi-AZ)
  image: tests/text_vs_image/images/03_complex_arch.png
  image_type: cloud_architecture
  specialized_prompt: prompts/architecture_mermaid.md
  question: 'このアーキテクチャ図の全コンポーネント、VPC/AZ/サブネットの階層、主要な接続（プロトコル含む）、Multi-AZ による冗長化の構造を教えてください。

    '
  ground_truth_facts:
  - id: f01
    text: タイトルは 'Production Architecture — AWS Multi-AZ'
