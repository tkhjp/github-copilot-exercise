        \ | read-only |\n\n## 補足\n- **タイトル**: Production Architecture — AWS Multi-AZ\n- **凡例**:\n  - 水色枠: Public Subnet\n\
        \  - 黄色枠: Private Subnet (App)\n  - 緑色枠: DB Subnet\n  - 紫色枠: External / DNS\n  - ピンク色枠: Cache\n- **グルーピング**: \n  -\
        \ VPC (10.0.0.0/16) 内で2つのアベイラビリティゾーン (AZ-a, AZ-b) に分割された冗長構成。\n- **注釈**:\n  - IAM Roles と CloudWatch Logs/Metrics\
