        \ **S3 Static Assets**\n\n## VPC\n4. **VPC: 10.0.0.0/16**\n\n## AZ-a（ap-northeast-1a）\n### Public Subnet\n5. **ALB\
        \ (AZ-a)**\n6. **NAT GW (AZ-a)**\n\n### Private Subnet (App)\n7. **ECS Fargate App Service (AZ-a)**\n8. **ElastiCache\
        \ Redis**（AZ-a 側）\n\n### DB Subnet\n9. **RDS PostgreSQL Primary**\n\n## AZ-b（ap-northeast-1c）\n### Public Subnet\n\
        10. **ALB (AZ-b)**\n11. **NAT GW (AZ-b)**\n\n### Private Subnet (App)\n12. **ECS Fargate App Service (AZ-b)**\n13.\
        \ **ElastiCache Redis**（AZ-b 側）\n\n### DB Subnet\n14. **RDS PostgreSQL Read Replica**\n\n## 共通管理系\n15. **IAM Roles**\n\
        16. **CloudWatch Logs/Metrics**\n\n---\n\n# 3. VPC / AZ / サブネットの階層\n\nこの図の階層は以下のようになっています。\n\n## 最上位\n- **AWS Region:\
        \ ap-northeast-1**\n\n## その中のネットワーク\n- **VPC: 10.0.0.0/16**\n\n## VPC の中の AZ\n- **AZ-a: ap-northeast-1a**\n- **AZ-b:\
        \ ap-northeast-1c**\n\n## 各 AZ の中のサブネット\n各 AZ に3種類のサブネットがあります。\n\n### 1) Public Subnet\n外部公開・インターネット接続に関わるコンポーネントを配置\n\
        - ALB\n- NAT Gateway\n\n### 2) Private Subnet (App)\nアプリケーション実行系を配置\n- ECS Fargate App Service\n- ElastiCache Redis\n\
        \n### 3) DB Subnet\nデータベース系を配置\n- RDS PostgreSQL Primary / Read Replica\n\n---\n\n# 4. 階層構造をツリーで表すと\n\n```text\nRegion:\
        \ ap-northeast-1\n└─ VPC: 10.0.0.0/16\n   ├─ AZ-a: ap-northeast-1a\n   │  ├─ Public Subnet\n   │  │  ├─ ALB (AZ-a)\n\
