- id: tc02_judge
  title: '[JUDGMENT] UI 変更要求の工数見積 (tc02 と同じ画像)'
  image: tests/text_vs_image/images/02_ui_change.png
  image_type: ui_change_request
  specialized_prompt: prompts/ui_change.md
  question: 'この UI 変更要求について、プロダクトマネージャーの立場で判断してください。既存画面と 4 つの赤い吹き出しの変更要求を読み、以下 4 点に具体的に答えてください。


    (1) 4 つの変更要求それぞれの実装工数見積もり (Small / Medium / Large) と理由。

    (2) 各変更がバックエンド (API) の変更を必要とするか否か。

    (3) 最も技術的リスクが高い変更はどれで、その理由は何か。

    (4) これら 4 つの変更を並列で実装できますか? 依存関係があれば指摘してください。'
  ground_truth_facts:
  - id: j01
    text: '変更 1 (Remember last search チェックボックス追加): 工数は Small または Medium'
  - id: j02
    text: '変更 1 の根拠: クライアント側の localStorage / cookie 保存、最小限のロジック追加'
  - id: j03
    text: '変更 2 (Search ボタン青→緑): 工数は Small'
  - id: j04
    text: '変更 2 の根拠: CSS の色変更のみ、ロジック不要'
  - id: j05
    text: '変更 3 (CSV エクスポートボタン追加): 工数は Medium または Large'
  - id: j06
    text: '変更 3 の根拠: 新規エンドポイント、データ整形、エンコーディング、ダウンロード処理が必要'
  - id: j07
    text: '変更 4 (1 ページ 20 件表示に変更): 工数は Small'
  - id: j08
    text: '変更 4 の根拠: 既存の pagination の page_size パラメータ変更'
  - id: j09
    text: 変更 1 はバックエンド変更が基本不要 (クライアント側完結)
  - id: j10
    text: 変更 2 はバックエンド変更が不要 (フロントの CSS のみ)
  - id: j11
