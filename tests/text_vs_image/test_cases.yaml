- id: tc04
  title: コードスクリーンショット
  image: tests/text_vs_image/images/04_code.png
  image_type: code
  specialized_prompt: prompts/code_transcription.md
  question: 'この画像のコードを正確に転写してください。ファイル名、言語、関数名、引数、戻り値も教えてください。

    '
  ground_truth_facts:
  - id: f1
    text: ファイル名は 'fibonacci.py'
  - id: f2
    text: 言語は Python
  - id: f3
    text: 関数名は 'fibonacci'
  - id: f4
    text: '引数は ''n: int'''
  - id: f5
    text: 戻り値型注釈は '-> int'
  - id: f6
    text: docstring は '"""Return the n-th Fibonacci number."""'
  - id: f7
    text: 'ベースケースは ''if n < 2: return n'''
  - id: f8
    text: ループは 'for _ in range(n - 1):'
  - id: f9
    text: swap 文は 'a, b = b, a + b'
  - id: f10
    text: 呼び出しは 'result = fibonacci(10)'
  - id: f11
    text: print 文は "print(f'F(10) = {result}')"
  - id: f12
    text: ダーク (黒) 背景のエディタテーマ
  descriptions:
    generic: "画像から読み取れる情報を構造的に記述します。\n\n### 1. テキスト内容\n画像内のすべてのテキストを、画面上のレイアウト（インデントや改行）に沿って以下に書き出します。\n\n**上部タイトルバー:**\n\
      ```\nfibonacci.py — Python\n```\n\n**コードエリア:**\n```python\ndef fibonacci(n: int) -> int:\n    \"\"\"Return the n-th\
      \ Fibonacci number.\"\"\"\n    if n < 2:\n        return n\n    a, b = 0, 1\n    for _ in range(n - 1):\n        a,\
      \ b = b, a + b\n    return b\n\nresult = fibonacci(10)\nprint(f'F(10) = {result}')\n```\n\n### 2. 図表・ダイアグラムの構造\n画像内にはフローチャートやグラフなどの図表・ダイアグラムは**含まれていません**。\n\
      すべてテキストベースのソースコードです。ただし、テキストの配置として、Pythonコード特有のスペースによるインデント（字下げ）を用いた階層構造（ブロック構造）が存在します。\n\n### 3. 色とレイアウト\n*   **レイアウト:**\n\
      \    *   画面全体は大きく上下の2つの領域に分かれています。上部に細い帯状のタイトルバーがあり、その下に広いコード表示エリアが広がっています。\n    *   コードエリアのテキストはすべて左揃えで配置されており、特定の行には行頭に空白（インデント）が設けられています。\n\
      *   **色 (テーマとシンタックスハイライト):**\n    *   **背景色:** 全体的にダークテーマが適用されています。タイトルバーは暗いグレー、コードエリアの背景はさらに暗いダークグレー（ほぼ黒に近い色）です。\n\
      \    *   **テキストカラー:**\n        *   **タイトルバーのテキスト:** ライトグレー（または白）。\n        *   **キーワード（`def`, `if`, `return`, `for`,\
      \ `in`）:** 明るい青色。\n        *   **関数定義の構成要素（`fibonacci`, `n`, `int`, `range`）:** 水色（キーワードの青よりやや淡い青）。\n        *   **ドキュメンテーション文字列（`\"\
      \"\"Return the n-th Fibonacci number.\"\"\"`）:** 緑色。\n        *   **一般の変数、数値、記号（`a`, `b`, `_`, `0`, `1`, `2`, `10`,\
      \ `result`, `:`, `<`, `=`, `,`, `-`, `+`, `()` など）:** 白色。関数呼び出し時の `fibonacci` も白色です。\n        *   **組み込み関数（`print`）:**\
      \ 淡い黄色（クリーム色）。\n        *   **f文字列（`f'F(10) = {result}'`）:** 黄土色（オリーブ色に近い黄色）。\n\n### 4. 主要な視覚要素\n*   **ファイル名/環境表示:**\
      \ 上部のバーにファイル名「fibonacci.py」と、実行環境または言語を示す「Python」の文字が配置されています。\n*   **プログラミングフォント:** コードエリアのテキストには、文字幅が均等な等幅フォント（プログラミング向けフォント）が使用されています。\n\
      *   **シンタックスハイライト:** コードの構文（予約語、文字列、変数、関数など）を視覚的に区別するための色分け機能が働いていることがわかります。"
    specialized: "## 言語\nPython\n\n## コード\n```python\ndef fibonacci(n: int) -> int:\n    \"\"\"Return the n-th Fibonacci number.\"\
      \"\"\n    if n < 2:\n        return n\n    a, b = 0, 1\n    for _ in range(n - 1):\n        a, b = b, a + b\n    return\
      \ b\n\nresult = fibonacci(10)\nprint(f'F(10) = {result}')\n```\n\n## 補足\n- タイトルバー/ファイル名: `fibonacci.py — Python`\n-\
      \ エディタ UI 要素（カーソルや選択範囲など）は特に見当たりません。"
  description_scores:
    generic: {}
    specialized: {}
  case1:
    copilot_answer: ''
    fact_scores: {}
  case2:
    copilot_answer: ''
    fact_scores: {}
