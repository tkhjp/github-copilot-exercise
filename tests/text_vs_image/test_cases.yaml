  descriptions:
    gemini_3_flash:
      generic: "この画像は、AWS（Amazon Web Services）におけるマルチAZ（Availability Zone）構成の「Production Architecture（本番環境アーキテクチャ）」を示したダイアグラムです。\n\
        \n画像から読み取れる情報を構造的に記述します。\n\n---\n\n### 1. テキスト内容 (OCR)\n\n*   **タイトル・メタデータ (左上):**\n    *   Production Architecture\
        \ — AWS Multi-AZ\n    *   Environment: prod ・ Region: ap-northeast-1\n*   **外部・共通コンポーネント:**\n    *   Route 53 DNS\n\
        \    *   CloudFront CDN (注釈: HTTPS)\n    *   S3 Static Assets (注釈: origin)\n    *   IAM Roles\n    *   CloudWatch\
        \ Logs/Metrics\n*   **ネットワーク境界:**\n    *   VPC: 10.0.0.0/16 (紫の破線枠)\n    *   AZ-a (ap-northeast-1a) (左側の水色の破線枠)\n\
        \    *   AZ-b (ap-northeast-1c) (右側の水色の破線枠)\n*   **サブネット内のコンポーネント (AZ-a / AZ-b共通):**\n    *   Public Subnet (上段水色枠)\n\
        \        *   ALB (AZ-a) / ALB (AZ-b)\n        *   NAT GW (AZ-a) / NAT GW (AZ-b) (注釈: Outbound)\n    *   Private Subnet\
        \ (App) (中段黄色枠)\n        *   ECS Fargate App Service (AZ-a) / (AZ-b)\n        *   ElastiCache Redis (注釈: GET/SET)\n\
        \    *   DB Subnet (下段緑色枠)\n        *   RDS PostgreSQL Primary (AZ-a側)\n        *   RDS PostgreSQL Read Replica (AZ-b側)\n\
        \        *   (注釈: write, read-only)\n*   **凡例 (最下部):**\n    *   Public Subnet (水色)\n    *   Private Subnet (App) (薄黄色)\n\
        \    *   DB Subnet (薄緑色)\n    *   External / DNS (薄紫色)\n    *   Cache (薄桃色)\n\n---\n\n### 2. 図表・ダイアグラムの構造\n\n####\
        \ 階層構造\n1.  **最上位:** リージョンレベル（ap-northeast-1）\n2.  **第2層:** VPC（10.0.0.0/16）\n3.  **第3層:** アベイラビリティーゾーン（AZ-a, AZ-b）\n\
        4.  **第4層:** サブネット（Public, Private, DB）\n5.  **第5層:** 各種AWSリソース（ALB, ECS, RDS等）\n\n#### ノードと接続（データフロー）\n*   **外部アクセス:**\
        \ Route 53 → CloudFront → 各AZのALB（HTTPS経由）。\n*   **静的コンテンツ:** CloudFront → S3（originとして参照）。\n*   **トラフィック分散:** 各ALB\
        \ → 同じAZ内の ECS Fargate App Service へ。\n*   **アプリケーション通信:**\n    *   ECS → ElastiCache Redis（GET/SET）。\n    *   ECS\
        \ (AZ-a) → RDS Primary（write）。\n    *   ECS (AZ-b) → RDS Primary（実線接続あり）、および RDS Read Replica（read-only）。\n*   **管理・監視:**\
        \ 全ECSインスタンス → CloudWatch Logs/Metrics（グレーの細線）。\n*   **アウトバウンド:** 各ECSインスタンス → NAT GW → 外部へ。\n\n---\n\n### 3. 色とレイアウト\n\
        \n*   **色の意味付け:**\n    *   **紫（破線）:** VPCの境界。\n    *   **水色（破線）:** AZの境界。\n    *   **水色（塗りつぶし）:** Public Subnet。\n\
        \    *   **黄色（塗りつぶし）:** Private Subnet (App)。\n    *   **緑色（塗りつぶし）:** DB Subnet。\n    *   **オレンジ/ベージュ:** コンピューティング（ECS）、ロードバランサー（ALB）などのアクティブなサービス。\n\
        \    *   **ピンク:** キャッシュ（Redis）および管理系（IAM, CloudWatch）。\n*   **レイアウト:**\n    *   左側にAZ-a、右側にAZ-bを配置した左右対称の構成。\n   \
        \ *   上から下へ「外部→パブリック→プライベート→データベース」という階層的なトラフィックフローを表現。\n\n---\n\n### 4. 主要な視覚要素\n\n*   **アイコン・形状:**\n    *   **角丸長方形:**\
        \ サービスやリソース（ALB, ECS, Redis等）。\n    *   **円柱形:** データベース（RDS Primary/Read Replica）。\n    *   **破線枠:** ネットワーク的な論理境界（VPC,\
        \ AZ）。\n    *   **矢印:** データの流れや依存関係。\n        *   黒太線: メインのトラフィック。\n        *   緑線: 書き込み（write）。\n        *   青線:\
        \ 読み取り専用（read-only）。\n        *   グレー細線: ログ転送やアウトバウンド等の補助的通信。\n*   **凡例の配置:** 画面下部に、使用されている色の意味を定義する凡例が配置されている。"
      specialized: "ご提示いただいた画像に基づき、システム構成を Mermaid 表記および各一覧で構造化します。\n\n## Mermaid 表記\n\n```mermaid\nflowchart TB\n    subgraph\
        \ External [External Services]\n        R53([Route 53 DNS])\n        IAM[[IAM Roles]]\n        CW[[CloudWatch Logs/Metrics]]\n\
        \    end\n\n    CF{CloudFront CDN}\n    S3[(S3 Static Assets)]\n\n    subgraph VPC [VPC: 10.0.0.0/16]\n        subgraph\
        \ AZ_a [AZ-a ap-northeast-1a]\n            subgraph Public_a [Public Subnet]\n                ALB_a[ALB AZ-a]\n  \
        \              NAT_a[NAT GW AZ-a]\n            end\n            subgraph Private_a [Private Subnet App]\n        \
        \        ECS_a[ECS Fargate App Service AZ-a]\n                Redis_a[(ElastiCache Redis)]\n            end\n    \
        \        subgraph DB_a [DB Subnet]\n                RDS_P[(RDS PostgreSQL Primary)]\n            end\n        end\n\
        \n        subgraph AZ_b [AZ-b ap-northeast-1c]\n            subgraph Public_b [Public Subnet]\n                ALB_b[ALB\
        \ AZ-b]\n                NAT_b[NAT GW AZ-b]\n            end\n            subgraph Private_b [Private Subnet App]\n\
        \                ECS_b[ECS Fargate App Service AZ-b]\n                Redis_b[(ElastiCache Redis)]\n            end\n\
        \            subgraph DB_b [DB Subnet]\n                RDS_R[(RDS PostgreSQL Read Replica)]\n            end\n  \
        \      end\n    end\n\n    %% Connections\n    R53 --> CF\n    CF -- origin --> S3\n    CF -- HTTPS --> ALB_a\n  \
        \  CF -- HTTPS --> ALB_b\n\n    ALB_a --> ECS_a\n    ALB_b --> ECS_b\n\n    ECS_a -- GET/SET --> Redis_a\n    ECS_b\
        \ -- GET/SET --> Redis_b\n\n    ECS_a -- write --> RDS_P\n    ECS_b -- write --> RDS_P\n    ECS_b -- read-only -->\
        \ RDS_R\n\n    ECS_a -- Outbound --> NAT_a\n    ECS_b -- Outbound --> NAT_b\n\n    %% Logging/Roles (Simplified)\n\
        \    ECS_a -.-> CW\n    ECS_b -.-> CW\n    ECS_a -.-> IAM\n    ECS_b -.-> IAM\n```\n\n## ノード一覧\n\n| ID | ラベル | 種別（service/db/queue/external/...）\
        \ |\n|---|---|---|\n| R53 | Route 53 DNS | external / DNS |\n| CF | CloudFront CDN | service / CDN |\n| S3 | S3 Static\
        \ Assets | service / storage |\n| ALB_a/b | ALB (AZ-a/b) | service / load balancer |\n| NAT_a/b | NAT GW (AZ-a/b)\
        \ | service / gateway |\n| ECS_a/b | ECS Fargate App Service (AZ-a/b) | service / compute |\n| Redis_a/b | ElastiCache\
        \ Redis | service / cache |\n| RDS_P | RDS PostgreSQL Primary | db |\n| RDS_R | RDS PostgreSQL Read Replica | db |\n\
        | IAM | IAM Roles | external / security |\n| CW | CloudWatch Logs/Metrics | external / monitoring |\n\n## 接続一覧\n\n\
        | From | To | ラベル（プロトコル等） |\n|---|---|---|\n| Route 53 DNS | CloudFront CDN | (DNS Resolution) |\n| CloudFront CDN\
        \ | S3 Static Assets | origin |\n| CloudFront CDN | ALB (AZ-a/b) | HTTPS |\n| ALB (AZ-a/b) | ECS Fargate App Service\
        \ (AZ-a/b) | HTTP/Forward |\n| ECS Fargate (AZ-a/b) | ElastiCache Redis | GET/SET |\n| ECS Fargate (AZ-a/b) | RDS\
        \ PostgreSQL Primary | write |\n| ECS Fargate (AZ-b) | RDS PostgreSQL Read Replica | read-only |\n| ECS Fargate (AZ-a/b)\
        \ | NAT GW (AZ-a/b) | Outbound |\n| 各種リソース | CloudWatch Logs/Metrics | Logs/Metrics (Telemetery) |\n| 各種リソース | IAM\
        \ Roles | Auth/Permissions |\n\n## 補足\n\n### タイトル\n- **Production Architecture — AWS Multi-AZ**\n- 環境: prod\n- リージョン:\
        \ ap-northeast-1\n\n### 凡例（色の意味）\n画像下部の凡例に基づきます：\n- **青枠 (Public Subnet):** 外部に公開されたリソース（ALB, NAT GW）を配置。\n- **黄枠\
        \ (Private Subnet App):** アプリケーション本体とキャッシュを配置。\n- **緑枠 (DB Subnet):** データベース層を配置。\n- **紫 (External / DNS):** AWS 外部、またはリージョンワイドな共通サービス（Route\
        \ 53, IAM, CloudWatch）。\n- **赤/ピンク (Cache):** ElastiCache (Redis)。\n\n### グルーピングの名前\n- **VPC (10.0.0.0/16):** システム全体のネットワーク境界。\n\
        - **AZ-a / AZ-b:** 物理的に分離されたアベイラビリティーゾーンによる冗長化。\n\n### その他注釈\n- **高可用性:** 2つのAZに跨るアクティブ/アクティブ構成。\n- **データベース:** Primary（書き込み）と\
        \ Read Replica（読み取り専用）に分かれており、AZ-b の App Service は Read Replica を優先的に参照する構成。\n- **アウトバウンド:** プライベートサブネットの ECS は NAT\
        \ Gateway を経由して外部へ通信。"
    gemini_31_flash_lite:
      generic: "ご提示いただいた画像は、AWSのマルチAZ構成を示すシステムアーキテクチャ図です。以下に構造的な詳細を記述します。\n\n### 1. テキスト内容\n*   **タイトル:** Production Architecture\
        \ — AWS Multi-AZ\n*   **メタデータ:** Environment: prod • Region: ap-northeast-1\n*   **各コンポーネントのラベル:**\n    *   Route\
        \ 53 DNS\n    *   CloudFront CDN\n    *   S3 Static Assets\n    *   VPC: 10.0.0.0/16\n    *   AZ-a (ap-northeast-1a)\n\
        \    *   Public Subnet\n    *   ALB (AZ-a)\n    *   NAT GW (AZ-a)\n    *   Private Subnet (App)\n    *   ECS Fargate\
        \ App Service (AZ-a)\n    *   ElastiCache Redis\n    *   DB Subnet\n    *   RDS PostgreSQL Primary\n    *   AZ-b (ap-northeast-1c)\n\
        \    *   Public Subnet\n    *   ALB (AZ-b)\n    *   NAT GW (AZ-b)\n    *   Private Subnet (App)\n    *   ECS Fargate\
        \ App Service (AZ-b)\n    *   ElastiCache Redis\n    *   DB Subnet\n    *   RDS PostgreSQL Read Replica\n    *   IAM\
        \ Roles\n    *   CloudWatch Logs/Metrics\n*   **接続ラベル:** origin, HTTPS, Outbound, GET/SET, write, read-only\n*   **凡例:**\
        \ Public Subnet, Private Subnet (App), DB Subnet, External / DNS, Cache\n\n### 2. 図表・ダイアグラムの構造\n*   **階層構造:** 最上位に「VPC」があり、その中に「AZ-a」と「AZ-b」の2つの並列的な領域が配置されています。\n\
        *   **サブネット階層:** 各AZ内に「Public Subnet」「Private Subnet (App)」「DB Subnet」が上から順に配置されています。\n*   **ノードの接続:**\n    *   Route\
        \ 53 → CloudFront → S3（静的アセット）\n    *   CloudFront → 各AZのALBへ分岐\n    *   各AZ内: ALB → ECS Fargate → ElastiCache\n \
        \   *   ECS Fargate（AZ-a） → RDS Primary（write）\n    *   ECS Fargate（AZ-b） → RDS Read Replica（read-only）\n    *   各AZのNAT\
        \ GWから外部への矢印（Outbound）\n    *   各コンポーネントから右側のIAM RolesおよびCloudWatchへの破線接続\n\n### 3. 色とレイアウト\n*   **色分け:** \n    *\
        \   **青枠:** Public Subnet\n    *   **黄枠:** Private Subnet (App)\n    *   **緑枠:** DB Subnet\n    *   **紫背景:** Route\
        \ 53, IAM Roles, CloudWatch（外部サービス）\n    *   **黄背景:** CloudFront, ALB, NAT GW\n    *   **オレンジ背景:** ECS Fargate\n \
        \   *   **ピンク背景:** ElastiCache\n*   **レイアウト:** \n    *   左上に主要な入口（DNS/CDN/S3）を配置。\n    *   中央にVPCを囲む大きな紫色の点線枠。\n \
        \   *   内部は左右対称の2列（AZ-aとAZ-b）構成。\n    *   右側にVPC外部の管理・権限系サービスが配置。\n    *   下部にカラーコードに基づいた凡例が記載されています。\n\n### 4. 主要な視覚要素\n\
        *   **コンテナ・ボックス:** サブネットを示す四角い枠と、サービスを表す角丸の四角形。\n*   **データベース:** RDSは円柱形のアイコンで表現されています。\n*   **接続線:** 黒い実線はリクエストや処理の流れを示し、緑色の太い矢印はデータベースへの書き込み/読み取りアクセス、細いグレーの破線はモニタリングやIAM関連の参照を示しています。"
