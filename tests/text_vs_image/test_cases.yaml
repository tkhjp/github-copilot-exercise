- id: tc03_judge
  title: '[JUDGMENT] AWS 構成図の視覚的特徴読解'
  image: tests/text_vs_image/images/03_complex_arch.png
  image_type: cloud_architecture
  test_type: judgment
  specialized_prompt: prompts/architecture_mermaid.md
  question: 'この AWS アーキテクチャ図を観察し、視覚的な手がかりを使って以下に答えてください。

    図から読み取れない情報を AWS の一般的な知識で補完することは禁止します。


    (1) VPC 境界（紫色の点線矩形）の内側に配置されているコンポーネントと、外側に配置されているコンポーネントを列挙してください。

    (2) 図の上から下への配置順序で、トラフィックが通る階層（最上流 → 最下流）を 4 層に分けて答えてください。

    (3) 図に描かれている接続線（矢印）のうち、緑色で太い線と青緑/シアンで太い線がそれぞれ何を結んでいて、どのような意味の違いがあるかを答えてください。

    (4) 図の凡例（下部のボックス）に列挙されているサブネット種別は何種類あり、それぞれ何色に対応していますか？

    '
  reasoning_points:
  - id: j01
    text: 'VPC 外側: Route 53, CloudFront, S3, IAM, CloudWatch'
  - id: j02
    text: 'VPC 内側: ALB, NAT GW, ECS Fargate, ElastiCache, RDS'
  - id: j03
    text: '第 1 層: Route 53 → CloudFront'
  - id: j04
    text: '第 2 層: ALB (Public Subnet)'
  - id: j05
    text: '第 3 層: ECS Fargate (Private Subnet)'
  - id: j06
    text: '第 4 層: RDS / ElastiCache (DB Subnet)'
  - id: j07
    text: 緑太線は ECS → RDS Primary (write)
  - id: j08
    text: 青緑/シアン太線は ECS → RDS Replica (read-only)
  - id: j09
    text: '凡例: 3 種類 (Public=青, Private App=黄, DB=緑)'
  descriptions:
    gemini_3_flash:
      generic: "提供された画像に基づき、AWSのマルチAZ（Multi-AZ）構成図を構造的に記述します。\n\n---\n\n### 1. テキスト内容（OCR的抽出）\n\n*   **タイトル・概要**\n    *  \
        \ `Production Architecture — AWS Multi-AZ`\n    *   `Environment: prod • Region: ap-northeast-1`\n*   **外部・エッジサービス（上部および右側）**\n\
        \    *   `Route 53 DNS`\n    *   `CloudFront CDN`\n    *   `S3 Static Assets`\n    *   `IAM Roles`\n    *   `CloudWatch\
        \ Logs/Metrics`\n*   **ネットワーク境界・コンテナ**\n    *   `VPC: 10.0.0.0/16`\n    *   `AZ-a (ap-northeast-1a)`\n    *   `AZ-b\
        \ (ap-northeast-1c)`\n    *   `Public Subnet`\n    *   `Private Subnet (App)`\n    *   `DB Subnet`\n*   **リソース（AZ-a内）**\n\
        \    *   `ALB (AZ-a)`\n    *   `NAT GW (AZ-a)`\n    *   `ECS Fargate App Service (AZ-a)`\n    *   `ElastiCache Redis`\n\
        \    *   `RDS PostgreSQL Primary`\n*   **リソース（AZ-b内）**\n    *   `ALB (AZ-b)`\n    *   `NAT GW (AZ-b)`\n    *   `ECS\
        \ Fargate App Service (AZ-b)`\n    *   `ElastiCache Redis`\n    *   `RDS PostgreSQL Read Replica`\n*   **矢印・注釈テキスト**\n\
        \    *   `HTTPS`（CloudFrontからALBへの流れ）\n    *   `origin`（CloudFrontからS3への参照）\n    *   `Outbound`（NAT GWから外部への流れ）\n\
        \    *   `GET/SET`（ECSからElastiCacheへの通信）\n    *   `write`（ECSからRDS Primaryへの書き込み）\n    *   `read-only`（ECSからRDS Read\
        \ Replicaへの読み込み）\n*   **凡例（Legend）**\n    *   `Public Subnet`, `Private Subnet (App)`, `DB Subnet`, `External / DNS`,\
        \ `Cache`\n\n---\n\n### 2. 図表・ダイアグラムの構造\n\n#### **階層構造**\n1.  **最上位（外部・グローバル）**:\n    *   DNS（Route 53）からCDN（CloudFront）へ接続。\n\
        \    *   CloudFrontはS3およびVPC内のALBと連携。\n    *   管理系（IAM, CloudWatch）は全体を包含するように右側に配置。\n2.  **VPC (10.0.0.0/16)**:\n\
        \    *   全体を紫色の点線枠で囲む。\n    *   内部を2つの**Availability Zone (AZ)**（青緑色の点線枠）に分割。\n3.  **Subnet層（AZ内）**:\n    *   各AZ内に3つのサブネット層が階層的に配置されている。\n\
        \    *   上段：**Public Subnet**（ALB, NAT GWを配置）\n    *   中段：**Private Subnet (App)**（ECS, ElastiCacheを配置）\n    *   下段：**DB\
        \ Subnet**（RDSを配置）\n\n#### **接続・ネットワークフロー**\n*   **ユーザーアクセス**: Route 53 → CloudFront → ALB (AZ-a/b)。\n*   **アプリケーション層**:\
        \ 各ALBから同一AZ内のECS Fargateへトラフィックを転送。\n*   **キャッシュ**: ECSから同一AZ内のElastiCache Redisへ双方向通信（GET/SET）。\n*   **データベース**:\n\
        \    *   両方のAZのECSからAZ-aの「RDS Primary」へ緑色の線（write）が接続。\n    *   AZ-bのECSからAZ-bの「RDS Read Replica」へ青緑色の線（read-only）が接続。\n\
        *   **アウトバウンド**: ECSからNAT GWを経由して外部へ。\n*   **モニタリング**: 主要コンポーネントからCloudWatchへグレーの点線が伸びている。\n\n---\n\n### 3. 色とレイアウト\n\
        \n*   **レイアウト**:\n    *   上から下へトラフィックが流れる論理的な階層構造。\n    *   左（AZ-a）と右（AZ-b）で対称的な二重化構造。\n*   **配色（背景色と境界線）**:\n   \
        \ *   **紫色（点線）**: VPCの境界。\n    *   **青緑色（点線）**: AZの境界。\n    *   **薄い青色**: Public Subnetの背景。\n    *   **薄い黄色**: Private\
        \ Subnetの背景。\n    *   **薄い緑色**: DB Subnetの背景。\n*   **コンポーネントの色**:\n    *   **薄紫色**: 外部サービス（DNS, IAM, Logs）。\n    *\
        \   **黄色**: エッジサービス（CloudFront）。\n    *   **淡い緑**: ストレージ（S3）。\n    *   **オレンジ/ベージュ**: コンピューティング（ECS）およびロードバランサー（ALB）。\n\
        \    *   **ピンク**: キャッシュ（Redis）。\n    *   **濃い緑/青緑**: データベース（RDS）。\n\n---\n\n### 4. 主要な視覚要素\n\n*   **境界線**: VPCやAZ、各サブネットを囲む長方形。サブネットは角が直角、サービスユニットは角丸の長方形で表現。\n\
        *   **アイコン**:\n    *   RDSは円筒形のデータベースアイコンを使用。\n    *   その他のサービスはテキスト入りの角丸ボックス。\n*   **矢印の種類**:\n    *   **黒実線**: 通常の通信・データフロー。\n\
