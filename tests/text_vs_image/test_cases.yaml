  - id: f12
    text: テーブルのセクション見出しは 'Regional Sales (MJPY)'
  - id: f13
    text: テーブルは 5 列 (Region, Jan, Feb, Mar, Total)
  - id: f14
    text: テーブルは 4 行 (Tokyo, Osaka, Nagoya, Fukuoka)
  - id: f15
    text: Tokyo の Mar の値は 160
  - id: f16
    text: Tokyo の Total の値は 365
  - id: f17
    text: Fukuoka の Total の値は 150
  - id: f18
    text: コードのファイル名は 'quarterly_total.py'
  - id: f19
    text: 関数名は 'quarterly_total'
  - id: f20
    text: '引数は ''region: str'''
  - id: f21
    text: 戻り値型注釈は '-> int'
  - id: f22
    text: コードは 'data = SALES[region]' を含む
  - id: f23
    text: 'フッター注釈に ''Q1 total revenue: 975 million JPY'' と記載'
  - id: f24
    text: フッター注釈に 'Mar was the strongest month' と記載
  descriptions:
    generic: "画像の内容について、ご指定の4つの観点から構造的に詳細に記述します。\n\n### 1. テキスト内容（OCR）\n画像内に含まれるすべてのテキストをセクションごとに記述します。\n\n**ヘッダー部分:**\n*\
      \   2026 Q1 Operations Overview\n*   Revenue, Fulfillment, and Metrics\n\n**左上パネル:**\n*   Order Flow\n*   Receive Order\n\
      *   Validate Payment\n*   Ship Product\n\n**右上パネル:**\n*   Monthly Revenue (MJPY)\n*   120\n*   85\n*   160\n*   140\n\
      *   Jan\n*   Feb\n*   Mar\n*   Apr\n\n**左下パネル:**\n*   Regional Sales (MJPY)\n*   Region, Jan, Feb, Mar, Total\n*   Tokyo,\
      \ 120, 85, 160, 365\n*   Osaka, 90, 70, 110, 270\n*   Nagoya, 60, 55, 75, 190\n*   Fukuoka, 45, 40, 65, 150\n\n**右下パネル:**\n\
      *   quarterly_total.py\n*   `def quarterly_total(region: str) -> int:`\n*   `    \"\"\"Sum Jan+Feb+Mar for one region.\"\
      \"\"`\n*   `    data = SALES[region]`\n*   `    return data['Jan'] + data['Feb'] + data['Mar']`\n*   `total = quarterly_total('Tokyo')`\n\
      \n**フッター部分:**\n*   Q1 total revenue: 975 million JPY. Mar was the strongest month across all regions.\n\n---\n\n###\
      \ 2. 図表・ダイアグラムの構造\n\n**フローチャート (Order Flow):**\n*   **構造:** 3つの矩形ノードが左から右へ水平に配置され、直線的な階層を持つ。\n*   **ノード1:** 「Receive\
      \ Order」（改行あり）。黒い枠線を持つ長方形。\n*   **接続:** ノード1の右端からノード2の左端へ向かう右向きの矢印。\n*   **ノード2:** 「Validate Payment」（改行あり）。黒い枠線を持つ長方形。\n\
      *   **接続:** ノード2の右端からノード3の左端へ向かう右向きの矢印。\n*   **ノード3:** 「Ship Product」（改行あり）。黒い枠線を持つ長方形。\n\n**棒グラフ (Monthly Revenue (MJPY)):**\n\
      *   **軸:** 黒い実線で描かれたL字型の軸（Y軸とX軸）。Y軸に目盛りやラベルは無い。X軸の下にラベルがある。\n*   **データ要素:** 4本の垂直な棒グラフ。各棒は黒い枠線を持つ。\n*   **要素の配置と値:**\n\
      \    *   第1の棒: ラベル「Jan」、上部に値「120」\n    *   第2の棒: ラベル「Feb」、上部に値「85」\n    *   第3の棒: ラベル「Mar」、上部に値「160」（4本の中で最も高い）\n  \
      \  *   第4の棒: ラベル「Apr」、上部に値「140」\n\n**表 (Regional Sales (MJPY)):**\n*   **構造:** 5列×5行のグリッド構造。外枠は黒い実線。\n*   **ヘッダー行:**\
      \ 1行目。「Region」「Jan」「Feb」「Mar」「Total」の5項目。\n*   **データ行:** 2行目から5行目まで。各行の左端（Region列）に都市名があり、右側4列に数値データが格納されている。\n*   **罫線:**\
      \ ヘッダー行とデータ行の間、および各データ行の間に細いグレーの水平線がある。列を区切る垂直線は、ヘッダー行のみ白線で、データ行には明示的な縦線はない（背景の塗り分けのみ）。\n\n---\n\n### 3. 色とレイアウト\n\n\
      **全体レイアウト:**\n*   画面は上部のヘッダー帯、中央のメインコンテンツエリア（2行×2列の4パネル構成）、下部のフッター帯の3層構造になっている。\n*   背景色は、メインエリアが白色。\n\n**ヘッダー:**\n\
      *   背景色: 鮮やかな青色。\n*   テキスト: 白色、左寄せ。上の行は太字で大きく、下の行は標準の太さで小さい。\n\n**各パネルの見出し:**\n*   パネル上部に配置されたタイトルテキストはすべて黒色、太字、左寄せ。\n\
      \n**フローチャート (左上):**\n*   「Receive Order」ノード: 薄い青色の背景。\n*   「Validate Payment」ノード: 薄い黄色の背景。\n*   「Ship Product」ノード: 薄い緑色の背景。\n\
      *   テキストと枠線、矢印は黒色。\n\n**棒グラフ (右上):**\n*   「Jan」「Feb」「Apr」の棒: 青色。\n*   「Mar」の棒: オレンジ色。\n*   枠線、軸線、テキストは黒色。\n\n**表 (左下):**\n\
      *   ヘッダー行の背景: 水色（青）。\n*   ヘッダー行のテキストと縦の区切り線: 白色。\n*   データ行の背景: 白色。\n*   データ行のテキスト: 黒色。行を区切る水平線は薄いグレー。\n\n**コードスニペット\
      \ (右下):**\n*   背景色: 濃いダークグレー（ほぼ黒）。\n*   テキストのシンタックスハイライト:\n    *   キーワード(`def`, `return`など)や型ヒント: 水色・青色系。\n    *   文字列・ドックストリング(`\"\
      \"\"...\"\"\"`, `'Jan'`など): 緑色系。\n    *   変数名、関数名、記号(`=`, `+`など): 白色・薄いグレー。\n\n**フッター:**\n*   背景色: 非常に薄いグレー（またはわずかに青みがかった白）。\n\
      *   テキスト: 黒色、太字、左寄せ。\n\n---\n\n### 4. 主要な視覚要素\n\n*   **トップバナー:** ページ全体のコンテキスト（時期とトピック）を示す青い横長の領域。\n*   **4つの情報ブロック:**\
      \ 中央の白い領域に均等に配置された4つの独立した視覚コンポーネント。\n    1.  **業務プロセスの可視化（左上）:** 横方向のフローチャート図。\n    2.  **月別売上の推移（右上）:** 棒グラフ。特定の月（Mar）が色分けで強調されている。\n\
      \    3.  **地域別売上データ（左下）:** マトリクス状のデータテーブル。\n    4.  **計算ロジック（右下）:** ダークモード風の背景を持つプログラミングコードのブロック。\n*   **ボトムバナー:** ページ下部を横断し、全体の要約や結論を示す薄いグレーの領域。"
    specialized: "ご指示に従い、画像内のすべての要素を漏れなく抽出・構造化して出力します。\n\n## Step 1: レイアウトの全体像\nスライド全体は大きく以下の6つのセクション（領域）に分かれています。\n\n*  \
      \ **ヘッダー（上部）**: タイトルとサブタイトル（本文テキスト）\n*   **左上セクション**: Order Flow（フローチャート）\n*   **右上セクション**: Monthly Revenue (MJPY)（グラフ\
      \ / チャート）\n*   **左下セクション**: Regional Sales (MJPY)（表）\n*   **右下セクション**: quarterly_total.py（コード）\n*   **フッター（下部）**: まとめ・注釈（本文テキスト）\n\
      \n---\n\n## Step 2: 各セクションを専用形式で出力\n\n### ヘッダー（上部）\n**タイトル:**\n> 2026 Q1 Operations Overview\n\n**サブタイトル:**\n> Revenue,\
      \ Fulfillment, and Metrics\n\n### 左上セクション：フローチャート / プロセス図\n**タイトル:** Order Flow\n\n```mermaid\nflowchart LR\n    A[\"\
      Receive\\nOrder\"] --> B[\"Validate\\nPayment\"] --> C[\"Ship\\nProduct\"]\n```\n\n### 右上セクション：グラフ / チャート\n**タイトル:**\
      \ Monthly Revenue (MJPY)\n※X軸ラベル：月、Y軸：売上（MJPY）\n\n| ラベル | 値 | 単位 | 色・強調 |\n|---|---|---|---|\n| Jan | 120 | MJPY | 青色\
      \ |\n| Feb | 85 | MJPY | 青色 |\n| Mar | 160 | MJPY | オレンジ色（強調） |\n| Apr | 140 | MJPY | 青色 |\n\n### 左下セクション：表 (table)\n\
      **タイトル:** Regional Sales (MJPY)\n\n| Region | Jan | Feb | Mar | Total |\n|---|---|---|---|---|\n| Tokyo | 120 | 85 |\
      \ 160 | 365 |\n| Osaka | 90 | 70 | 110 | 270 |\n| Nagoya | 60 | 55 | 75 | 190 |\n| Fukuoka | 45 | 40 | 65 | 150 |\n\n\
      ### 右下セクション：コード\n**ファイル名:** quarterly_total.py\n\n```python\ndef quarterly_total(region: str) -> int:\n    \"\"\"Sum\
      \ Jan+Feb+Mar for one region.\"\"\"\n    data = SALES[region]\n    return data['Jan'] + data['Feb'] + data['Mar']\n\n\
      total = quarterly_total('Tokyo')\n```\n\n### フッター（下部）：本文テキスト / 注釈\n**テキスト:**\n> Q1 total revenue: 975 million JPY. Mar\
      \ was the strongest month across all regions.\n\n---\n\n## Step 3: 全体の主張\nこのスライドは2026年第1四半期（Q1）の業務概要（受注フロー、月次・地域別の収益状況など）を報告するものです。データから、Q1の総収益が9億7500万円（975\
      \ million JPY）であり、すべての地域において3月（Mar）の売上が最も好調であったことを結論付けています。"
