<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>Text vs Image Fidelity Report</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg: #f8fafc;
  --card: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --muted: #64748b;
  --accent: #2563eb;
  --present: #16a34a;
  --partial: #ca8a04;
  --missing: #dc2626;
  --na: #9ca3af;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "Hiragino Sans", "Yu Gothic UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  margin: 0;
  padding: 24px;
}
h1, h2, h3 { color: var(--text); margin-top: 0; }
h1 { font-size: 28px; }
h2 { font-size: 22px; margin-top: 32px; }
h3 { font-size: 16px; }
.muted { color: var(--muted); font-size: 14px; }
.summary {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
}
.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-top: 16px;
}
.summary-card {
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
  position: relative;
}
.summary-card.source-llm {
  background: #eff6ff;
  border-color: #93c5fd;
}
.summary-card.source-manual {
  background: #f5f5f5;
  border-color: #d1d5db;
}
.badge-mini {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid currentColor;
  background: white;
  white-space: nowrap;
}
.badge-mini.source-llm { color: #1d4ed8; }
.badge-mini.source-manual { color: #525252; }
.summary-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.summary-card .pct { font-size: 32px; font-weight: 700; margin: 8px 0; color: var(--accent); }
.summary-card .detail { font-size: 12px; color: var(--muted); }
.bar {
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 8px;
}
.bar > div { height: 100%; background: var(--accent); transition: width 0.3s; }
.case {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
}
.case-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}
.case-header h2 { margin: 0; }
.tag {
  display: inline-block;
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  color: var(--muted);
  margin-left: 8px;
}
.case-body {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 24px;
  margin-bottom: 16px;
}
.case-image img {
  max-width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
}
.question-block {
  background: var(--bg);
  border-left: 4px solid var(--accent);
  padding: 12px 16px;
  border-radius: 4px;
  margin-bottom: 16px;
  font-size: 14px;
  white-space: pre-wrap;
}
.fact-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 12px;
}
.fact-table th, .fact-table td {
  padding: 6px 8px;
  border: 1px solid var(--border);
  text-align: left;
  vertical-align: top;
}
.fact-table th {
  background: var(--bg);
  font-weight: 600;
  font-size: 12px;
}
.fact-table td.score {
  text-align: center;
  font-weight: 700;
  font-size: 18px;
}
.score-present { color: var(--present); }
.score-partial { color: var(--partial); }
.score-missing { color: var(--missing); }
.score-na { color: var(--na); }
.eval-section-title {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-top: 24px;
  margin-bottom: 8px;
}
.eval-section-title h3 { margin: 0; font-size: 16px; }
.eval-section-title .hint { font-size: 12px; color: var(--muted); }
.eval-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 8px;
}
.eval-col {
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  position: relative;
}
.eval-col.source-llm {
  background: #eff6ff;
  border-color: #93c5fd;
}
.eval-col.source-manual {
  background: #f5f5f5;
  border-color: #d1d5db;
}
.eval-col-badge {
  position: absolute;
  top: -10px;
  left: 12px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid currentColor;
  background: white;
}
.eval-col.source-llm .eval-col-badge {
  color: #1d4ed8;
}
.eval-col.source-manual .eval-col-badge {
  color: #525252;
}
.eval-col-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  margin-top: 6px;
}
.eval-col-header .col-name {
  font-weight: 600;
  font-size: 13px;
}
.eval-col-header .col-meta {
  display: flex;
  gap: 8px;
  align-items: baseline;
}
.eval-col-header .col-chars {
  font-size: 11px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}
.eval-col-header .col-score {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
}
.eval-col-expand {
  position: absolute;
  top: 8px;
  right: 8px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 11px;
  cursor: pointer;
  color: var(--muted);
}
.eval-col-expand:hover { color: var(--accent); border-color: var(--accent); }
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 32px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white;
  border-radius: 12px;
  max-width: 1000px;
  width: 100%;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.modal-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-header h3 { margin: 0; }
.modal-close {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: var(--muted);
}
.modal-body {
  padding: 24px;
  overflow-y: auto;
  flex-grow: 1;
}
.eval-content {
  font-size: 12px;
  white-space: pre-wrap;
  background: white;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px;
  max-height: 360px;
  overflow-y: auto;
  flex-grow: 1;
  min-height: 120px;
}
.eval-content.empty {
  color: var(--muted);
  font-style: italic;
}
.eval-content pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; }
.eval-content .mermaid {
  background: white;
  text-align: center;
  margin: 8px 0;
}
.legend {
  display: flex;
  gap: 16px;
  align-items: center;
  font-size: 12px;
  color: var(--muted);
  margin-top: 16px;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: 6px;
}
.legend span { font-weight: 700; font-size: 16px; margin-right: 4px; }
.toc {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 24px;
  margin-bottom: 24px;
}
.toc ol { margin: 8px 0 0 0; padding-left: 20px; }
.toc a { color: var(--accent); text-decoration: none; }
.toc a:hover { text-decoration: underline; }
@media (max-width: 1100px) {
  .case-body { grid-template-columns: 1fr; }
  .eval-grid { grid-template-columns: 1fr 1fr; }
  .summary-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<h1>Text vs Image — Copilot Chat Fidelity Report</h1>
<p class="muted">画像を Copilot Chat に渡す方法（テキスト記述経由 vs 画像直接）でどの程度の情報損失が起きるか、またプロンプト工夫で記述の質をどれだけ改善できるかを評価。</p>

<div class="summary">
  <h2>集計サマリー</h2>
  <p class="muted">各列の Ground Truth fact カバー率（present=1.0、partial=0.5、missing=0）。未採点は除外。</p>
  <div id="summary-grid" class="summary-grid"></div>
  <div class="legend">
    <span class="score-present">✓</span> present (1.0)
    <span class="score-partial">△</span> partial (0.5)
    <span class="score-missing">✗</span> missing (0.0)
    <span class="score-na">—</span> 未採点
  </div>
</div>

<div class="toc">
  <strong>テストケース一覧</strong>
  <ol id="toc-list"></ol>
</div>

<div id="cases"></div>

<div id="modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

hQsX/pSNcwAAdRTGYAEAAAAwDC1YAAAAAAxDwAIAAABgGAIWAAAAAMMQsAAAAAAYhoAFAAAAwDAELAAAAACGIWABAAAAMAwBCwAAAIBhCFgAAAAADEPAAgAAAGAYAhYAAAAAwxCwAAAAABiGgAUAAADAMAQsAAAAAIYhYAEAAAAwDAELAAAAgGEIWAAAAAAMQ8ACAAAAYBgCFgAAAADDELAAAAAAGIaABQAAAMAwBCwAAAAAhiFgAQAAADAMAQsAAACAYQhYAAAAAAxDwAIAAABgGAIWAAAAAMMQsAAAAAAYhoAFAAAAwDAELAAAAACGIWABAAAAMAwBCwAAAIBhCFgAAAAADEPAAgAAAGAYAhYAAAAAwxCwAAAAABiGgAUAAADAMAQsAAAAAIYhYAEAAAAwDAELAAAAgGEIWAAAAAAMQ8ACAAAAYBgCFgAAAADDELAAAAAAGIaABQAAAEAx63+I0CPqsb3Q4gAAAABJRU5ErkJggg==", "image_type": "flowchart", "specialized_prompt": "prompts/flowchart_mermaid.md", "question": "この画像のフローチャートについて、ステップ数、各ステップの名前、矢印の向き、タイトル、注釈テキストを教えてください。", "facts": [{"id": "f1", "text": "ステップは 3 つ"}, {"id": "f2", "text": "1 番目のステップは 'Receive Order'"}, {"id": "f3", "text": "2 番目のステップは 'Validate Payment'"}, {"id": "f4", "text": "3 番目のステップは 'Ship Product'"}, {"id": "f5", "text": "矢印は左から右への単方向"}, {"id": "f6", "text": "タイトルは 'Order Processing Flow'"}, {"id": "f7", "text": "注釈に 'Success rate: 97.3% (Q1 2026)' と記載"}, {"id": "f8", "text": "Receive Order ボックスの背景色は薄い青"}], "columns": {"generic": {"kind": "description", "source": "llm", "content": "提供された画像について、ご指定の項目に沿って構造的に記述します。\n\n### 1. テキスト内容（OCR）\n画像内に含まれるテキストは以下の通りです。\n\n*   **左上部（タイトル）:**\n    *   `Order Processing Flow`\n*   **左のボックス内:**\n    *   `Receive`\n    *   `Order`\n*   **中央のボックス内:**\n    *   `Validate`\n    *   `Payment`\n*   **右のボックス内:**\n    *   `Ship`\n    *   `Product`\n*   **左下部（注釈）:**\n    *   `Success rate: 97.3% (Q1 2026)`\n\n### 2. 図表・ダイアグラムの構造\n左から右へと一直線に進む、3つのステップからなるフローチャートです。\n\n*   **ノード（ボックス）:**\n    *   **ノード1（左）:** テキスト「Receive Order」を含む。\n    *   **ノード2（中央）:** テキスト「Validate Payment」を含む。\n    *   **ノード3（右）:** テキスト「Ship Product」を含む。\n*   **接続（矢印）:**\n    *   ノード1の右辺中央から、ノード2の左辺中央へ向かう右向きの矢印。\n    *   ノード2の右辺中央から、ノード3の左辺中央へ向かう右向きの矢印。\n*   **階層:** 分岐や並列処理のない、フラットな単一階層の順次構造です。\n\n### 3. 色とレイアウト\n*   **背景色:** 全体の背景は白色です。\n*   **レイアウト:**\n    *   タイトルテキストは左上に配置されています。\n    *   3つのノード（ボックス）は、画像の中央部分に水平に等間隔で配置されています。\n    *   注釈テキストは左下に配置されています。\n*   **要素の色:**\n    *   **ノード1（Receive Order）:** 背景色は薄い青色。\n    *   **ノード2（Validate Payment）:** 背景色は薄い黄色。\n    *   **ノード3（Ship Product）:** 背景色は薄い緑色。\n    *   **ボックスの枠線:** 全てのボックスは太い黒色の実線で縁取られています。\n    *   **矢印:** 線の部分、鏃（やじり）の部分ともに黒色です。\n    *   **テキスト:** タイトルとボックス内のテキストは黒色。左下の注釈テキストは濃いグレー色です。\n\n### 4. 主要な視覚要素\n*   **長方形のボックス:** 同一サイズ・同一形状の長方形が3つ使用されています。\n*   **矢印:** 直線と三角形の鏃（やじり）で構成された、太くシンプルな右向きの矢印が2本使用されています。\n*   フォントは全てサンセリフ体（ゴシック体）で統一されています。", "char_count": 1295, "scores": {}}, "specialized": {"kind": "description", "source": "llm", "content": "## Mermaid 表記\n\n```mermaid\nflowchart LR\n    A[\"Receive<br>Order\"] --> B[\"Validate<br>Payment\"]\n    B --> C[\"Ship<br>Product\"]\n```\n\n## 補足情報\n\n*   **タイトル**: Order Processing Flow (左上に配置)\n*   **注釈・補足テキスト**: Success rate: 97.3% (Q1 2026) (左下にグレーの文字で配置)\n*   **色分けの意味**: 画像内に凡例はありませんが、各プロセスで背景色が異なります。\n    *   Receive Order: 薄い水色\n    *   Validate Payment: 薄い黄色\n    *   Ship Product: 薄い緑色\n*   **手書き or 印字の区別**: すべて印字（デジタルで作成された図）\n*   **その他特筆すべき視覚要素**: 各プロセスのノードは長方形で、太い黒の枠線が描画されています。", "char_count": 474, "scores": {}}, "case1": {"kind": "case", "source": "manual", "content": "", "char_count": 0, "scores": {}}, "case2": {"kind": "case", "source": "manual", "content": "", "char_count": 0, "scores": {}}}, "scores_per_column": {"generic": {"weighted": 0.0, "total": 8, "scored": 0, "percent": 0.0}, "specialized": {"weighted": 0.0, "total": 8, "scored": 0, "percent": 0.0}, "case1": {"weighted": 0.0, "total": 8, "scored": 0, "percent": 0.0}, "case2": {"weighted": 0.0, "total": 8, "scored": 0, "percent": 0.0}}}, {"id": "tc02", "title": "棒グラフ", "image": "tests/text_vs_image/images/02_barchart.png", "image_data_uri": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAlgAAAGQCAIAAAD9V4nPAAAqTElEQVR4nO3deXxN18L/8bUzJxKJTDUmhsSQhFBaQ3NRQ6OIOZRGaKnGcO+l6nZ2aWkJF+Ua6t7XNZSaihqKEqHhoWnF0BDVqMaJNsgcIZHpPK+n6/c7r3NPYghJTmJ93n/1rLX2Pmvv7O7vWWsPNL1eLwAAUJWFuTsAAIA5EYQAAKURhAAApRGEAAClEYQAAKURhA し、目的の図形の枠線に到達しています。", "char_count": 1798, "scores": {}}, "specialized": {"kind": "description", "source": "llm", "content": "画像の内容に基づき、システム構成図を構造化して出力します。\n\n## Mermaid 表記\n\n```mermaid\nflowchart LR\n    A[\"Web Client\\n(Browser)\"]\n    B[\"API Server\\n(FastAPI)\"]\n    C[(\"Database\\n(PostgreSQL)\")]\n    D[\"Cache\\n(Redis)\"]\n\n    A -- \"HTTPS\" --> B\n    B -- \"SQL\" --> C\n    B -- \"GET/SET\" --> D\n\n    %% スタイリング（画像の凡例に基づく色分け）\n    style A fill:#dae8fc,stroke:#000000\n    style B fill:#fff2cc,stroke:#000000\n    style C fill:#d5e8d4,stroke:#000000\n    style D fill:#f8cecc,stroke:#000000\n```\n\n## ノード一覧\n\n| ID | ラベル | 種別（service/db/queue/external/...） |\n|---|---|---|\n| A | Web Client (Browser) | client |\n| B | API Server (FastAPI) | service / api |\n| C | Database (PostgreSQL) | db |\n| D | Cache (Redis) | cache |\n\n## 接続一覧\n\n| From | To | ラベル（プロトコル等） |\n|---|---|---|\n| A (Web Client) | B (API Server) | HTTPS |\n| B (API Server) | C (Database) | SQL |\n| B (API Server) | D (Cache) | GET/SET |\n\n## 補足\n\n- **タイトル**: Web Application Architecture\n- **凡例（Legend）**: \n  - `blue` = client (Web Client)\n  - `yellow` = api (API Server)\n  - `green` = db (Database)\n  - `red` = cache (Cache)\n- **グルーピングの名前**: 特になし\n- **その他注釈**: なし", "char_count": 1076, "scores": {}}, "case1": {"kind": "case", "source": "manual", "content": "", "char_count": 0, "scores": {}}, "case2": {"kind": "case", "source": "manual", "content": "", "char_count": 0, "scores": {}}}, "scores_per_column": {"generic": {"weighted": 0.0, "total": 11, "scored": 0, "percent": 0.0}, "specialized": {"weighted": 0.0, "total": 11, "scored": 0, "percent": 0.0}, "case1": {"weighted": 0.0, "total": 11, "scored": 0, "percent": 0.0}, "case2": {"weighted": 0.0, "total": 11, "scored": 0, "percent": 0.0}}}], "columns": [{"key": "generic", "label": "Generic 記述", "kind": "description", "source": "llm", "badge": "LLM 自動生成"}, {"key": "specialized", "label": "Specialized 記述", "kind": "description", "source": "llm", "badge": "LLM 自動生成"}, {"key": "case1", "label": "Case 1: text → Copilot", "kind": "case", "source": "manual", "badge": "手動入力"}, {"key": "case2", "label": "Case 2: image → Copilot", "kind": "case", "source": "manual", "badge": "手動入力"}], "aggregates": {"generic": {"weighted": 0.0, "total": 50, "scored": 0, "percent": 0.0, "coverage": 0.0}, "specialized": {"weighted": 0.0, "total": 50, "scored": 0, "percent": 0.0, "coverage": 0.0}, "case1": {"weighted": 0.0, "total": 50, "scored": 0, "percent": 0.0, "coverage": 0.0}, "case2": {"weighted": 0.0, "total": 50, "scored": 0, "percent": 0.0, "coverage": 0.0}}};

mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });

function escapeHtml(str) {
  return (str || "").replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function renderContent(text) {
  if (!text || !text.trim()) {
    return '<div class="eval-content empty">（未入力）</div>';
  }
  // Use marked to render Markdown, then post-process Mermaid blocks
  let html;
  try {
    html = marked.parse(text, { breaks: true, gfm: true });
  } catch (e) {
    html = '<pre>' + escapeHtml(text) + '</pre>';
  }
  // Replace mermaid code blocks: marked outputs <pre><code class="language-mermaid">...</code></pre>
  html = html.replace(
    /<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g,
    (m, code) => '<div class="mermaid">' + code.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#39;/g, "'") + '</div>'
  );
  return '<div class="eval-content">' + html + '</div>';
}

function renderSummary() {
  const grid = document.getElementById('summary-grid');
  grid.innerHTML = '';
  for (const col of DATA.columns) {
    const agg = DATA.aggregates[col.key];
    const card = document.createElement('div');
    card.className = 'summary-card source-' + col.source;
    const pct = agg.total ? agg.percent.toFixed(1) : '—';
    const cov = agg.total ? agg.coverage.toFixed(0) : '0';
    card.innerHTML = `
      <div class="badge-mini source-${col.source}">${escapeHtml(col.badge)}</div>
      <div class="label">${escapeHtml(col.label)}</div>
      <div class="pct">${pct}<small style="font-size:14px;color:var(--muted);">%</small></div>
      <div class="detail">採点済 ${agg.scored}/${agg.total} facts (${cov}%)</div>
      <div class="bar"><div style="width:${agg.total ? agg.percent : 0}%;"></div></div>
    `;
    grid.appendChild(card);
  }
}

function renderToc() {
  const ol = document.getElementById('toc-list');
  ol.innerHTML = '';
  for (const c of DATA.cases) {
    const li = document.createElement('li');
    li.innerHTML = `<a href="#${c.id}">${escapeHtml(c.title)}</a> <span class="muted">(${escapeHtml(c.image_type)})</span>`;
    ol.appendChild(li);
  }
}

function renderFactTable(c) {
  let html = '<table class="fact-table"><thead><tr><th style="width:30px;">#</th><th>Ground Truth Fact</th>';
  for (const col of DATA.columns) {
    html += `<th style="width:80px;text-align:center;">${escapeHtml(col.label)}</th>`;
  }
  html += '</tr></thead><tbody>';
  for (let i = 0; i < c.facts.length; i++) {
    const f = c.facts[i];
    html += `<tr><td>${i + 1}</td><td>${escapeHtml(f.text)}</td>`;
    for (const col of DATA.columns) {
      const score = (c.columns[col.key].scores || {})[f.id] || null;
      const cls = score ? `score-${score}` : 'score-na';
      const icon = score === 'present' ? '✓' : score === 'partial' ? '△' : score === 'missing' ? '✗' : '—';
      html += `<td class="score ${cls}">${icon}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

function renderCase(c) {
  const div = document.createElement('div');
  div.className = 'case';
  div.id = c.id;

  let evalCols = '';
  for (const col of DATA.columns) {
    const score = c.scores_per_column[col.key];
    const pct = score.total && score.scored ? score.percent.toFixed(0) + '%' : '—';
    const colData = c.columns[col.key];
    const charText = colData.content ? `${colData.char_count.toLocaleString()} 文字` : '0 文字';
    evalCols += `
      <div class="eval-col source-${col.source}" data-case="${c.id}" data-col="${col.key}">
        <span class="eval-col-badge">${escapeHtml(col.badge)}</span>
        <button class="eval-col-expand" onclick="openModal('${c.id}','${col.key}')">⛶ 拡大</button>
        <div class="eval-col-header">
          <span class="col-name">${escapeHtml(col.label)}</span>
          <span class="col-meta">
            <span class="col-chars">${charText}</span>
            <span class="col-score">${pct}</span>
          </span>
        </div>
        ${renderContent(colData.content)}
      </div>
    `;
  }

  div.innerHTML = `
    <div class="case-header">
      <h2>${escapeHtml(c.id)} — ${escapeHtml(c.title)}
        <span class="tag">type: ${escapeHtml(c.image_type)}</span>
        <span class="tag">prompt: ${escapeHtml(c.specialized_prompt)}</span>
      </h2>
    </div>
    <div class="case-body">
      <div class="case-image">
        ${c.image_data_uri ? `<img src="${c.image_data_uri}" alt="${escapeHtml(c.title)}" />` : '<em>(image missing)</em>'}
        <p class="muted" style="font-size:12px;">${escapeHtml(c.image)}</p>
      </div>
      <div>
        <h3>質問</h3>
        <div class="question-block">${escapeHtml(c.question)}</div>
        <h3>Ground Truth ファクト採点</h3>
        ${renderFactTable(c)}
      </div>
    </div>
    <div class="eval-section-title">
      <h3>各評価対象の出力</h3>
      <span class="hint">← <strong style="color:#1d4ed8;">青枠 = LLM 自動生成</strong> ／ <strong style="color:#525252;">グレー枠 = Copilot Chat 手動入力</strong> →</span>
    </div>
    <div class="eval-grid">${evalCols}</div>
  `;
  return div;
}

function renderAll() {
  renderSummary();
  renderToc();
  const container = document.getElementById('cases');
  for (const c of DATA.cases) {
    container.appendChild(renderCase(c));
  }
  // run mermaid after content is in the DOM
  setTimeout(() => mermaid.run({ querySelector: '.mermaid' }), 100);
}

function openModal(caseId, colKey) {
  const c = DATA.cases.find(x => x.id === caseId);
  if (!c) return;
  const col = DATA.columns.find(x => x.key === colKey);
  const colData = c.columns[colKey];
  const titleEl = document.getElementById('modal-title');
  const bodyEl = document.getElementById('modal-body');
  titleEl.innerText = `${c.id} ${c.title} — ${col.label} (${col.badge}, ${colData.char_count.toLocaleString()} 文字)`;
  bodyEl.innerHTML = renderContent(colData.content);
  document.getElementById('modal').classList.add('open');
  setTimeout(() => mermaid.run({ querySelector: '#modal-body .mermaid' }), 50);
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

renderAll();
</script>
