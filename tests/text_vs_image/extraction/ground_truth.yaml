p05:
  id: p05
  title: 決済システム 階層ドリルダウン
  pattern_name: hierarchical_drilldown
  description: '上: システム全体 5 モジュール / 下: 決済コアモジュール拡大 + 設定パラメータ表'
  facts:
  - id: p05_f01
    text: 上段のシステム全体図にモジュールが 5 つ配置されている
  - id: p05_f02
    text: 'モジュール: 認証 / 商品カタログ / 決済コア / 通知 / 分析'
  - id: p05_f03
    text: 下段で決済コアモジュールが拡大表示されている
  - id: p05_f04
    text: 決済コアのサブモジュールは 4 つ
  - id: p05_f05
    text: 'サブモジュール: PG アダプタ / 手数料計算 / リトライ制御 / ログ/監査'
  - id: p05_f06
    text: 設定パラメータ表の列は パラメータ / 現行値 / 推奨値
  - id: p05_f07
    text: retry_max は現行 3、推奨 5
  - id: p05_f08
    text: timeout_sec は現行 10、推奨 15
  - id: p05_f09
    text: idempotency_key_ttl は現行 24h、推奨 72h
  - id: p05_f10
    text: log_retention は現行 30d、推奨 180d
  - id: p05_f11
    text: 設定パラメータ表は 4 行
  - id: p05_f12
    text: 上段から下段への拡大関係 (ドリルダウン) が矢印で示されている
  - id: p05_f13
    text: 上段の 5 モジュール中、拡大対象は決済コアのみ
  - id: p05_f14
    text: すべての推奨値は現行値より大きい方向への変更
  - id: p05_f15
    text: 階層は 2 段 (全体 → 特定モジュール)
  - id: p05_f16
    text: 'スライド上部 (タイトル直下) の小さいメタ情報行: env: production-apac | Owner: Platform Team | Last audit: 2026-03-15'
  - id: p05_f17
    text: 'スライド下部のフッター: Platform Docs / Last modified: 2026-04-15'
p06:
  id: p06
  title: ダッシュボード デザインレビュー (赤入れ)
  pattern_name: review_comments
  description: ダッシュボードモック 1 枚 + 番号付き赤コメント 15 個 + 指示線
  facts:
  - id: p06_f01
    text: モックアップにはヘッダー / サイドナビ / KPI カード / 売上推移グラフ / 最新取引テーブル / フッターの 6 セクション
  - id: p06_f02
    text: 赤コメントは 15 個 (R01-R15)
  - id: p06_f03
    text: 'R01: ロゴは左寄せではなく中央'
  - id: p06_f04
    text: 'R02: 通知アイコンに未読バッジ追加'
  - id: p06_f05
    text: 'R03: サイドナビの配色を背景色から白背景に'
  - id: p06_f06
    text: 'R04: KPI カードは 4 枚ではなく 3 枚に減らす'
  - id: p06_f07
    text: 'R05: KPI カードのフォントサイズを大きく'
  - id: p06_f08
    text: 'R06: グラフに前年比の点線を追加'
  - id: p06_f09
    text: 'R07: グラフの凡例を右上から下に移動'
  - id: p06_f10
    text: 'R08: テーブルのゼブラストライプを薄く'
  - id: p06_f11
    text: 'R09: テーブルヘッダーは sticky に'
  - id: p06_f12
    text: 'R10: 取引金額の桁区切りカンマ必須'
  - id: p06_f13
    text: 'R11: 金額のマイナスは赤字'
  - id: p06_f14
    text: 'R12: フッターのリンクは 3 つまで'
  - id: p06_f15
    text: 'R13: 全体的にマージンを 16px → 24px'
  - id: p06_f16
    text: 'R14: モバイル対応のブレークポイント要確認'
  - id: p06_f17
    text: 'R15: ダークモード対応は別 issue で'
  - id: p06_f18
    text: コメントは赤色の番号付き吹き出しで表示
  - id: p06_f19
    text: 指示線が対象要素と各コメントを結んでいる
  - id: p06_f20
    text: 'スライド上部 (タイトル直下) の小さいメタ情報行: PR #2847 | Figma: 1920x1080 | Weekly Design Review 2026-04-10 15:00'
  - id: p06_f21
    text: 'スライド下部のフッター: Design System Team / Draft v0.7'
