  - id: p01_f09
    text: 2026-04-02 (木) のステータスは「承認待」
  - id: p01_f10
    text: 2026-04-03 (金) のステータスは「要修正」
  - id: p01_f11
    text: 2026-04-03 (金) の実働は 07:35
  - id: p01_f12
    text: 2026-04-04 (月) のステータスは「承認済」
