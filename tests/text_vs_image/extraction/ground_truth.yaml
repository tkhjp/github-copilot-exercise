p01:
  id: p01
  title: 勤怠アプリ画面レビュー
  pattern_name: ui_callouts
  description: 'v2: アプリ画面 SS (8 行テーブル + ヘッダー右側アイコン + タブ + フィルタ + summary 行) + 赤吹き出し 6 個 (vague メモ風)'
  facts:
  - id: p01_f01
    text: アプリ画面のタイトルは「勤怠管理」
  - id: p01_f02
    text: ログインユーザー表示は「田中 太郎 さん」
  - id: p01_f03
    text: ヘッダー右側に通知アイコン (バッジ「3」未読) / 設定アイコン / ログアウト の 3 アイコン
  - id: p01_f04
    text: タブバーは「今月」「先月」「全期間」の 3 つ、現在「今月」がアクティブ
  - id: p01_f05
    text: 部署フィルタの dropdown あり、デフォルト「すべて」
  - id: p01_f06
    text: 'テーブルは 7 列: 日付 / 出勤 / 退勤 / 実働 / 残業 / ステータス / 備考'
  - id: p01_f07
    text: テーブル本体は 8 行のデータ + 末尾に summary 行
  - id: p01_f08
    text: 2026-04-01 (水) の実働 08:13、ステータス 承認済
  - id: p01_f09
    text: 2026-04-02 (木) の実働 09:42、残業 01:42、ステータス 承認待
  - id: p01_f10
    text: 2026-04-03 (金) の実働 07:35、ステータス 要修正、備考「代休消化」
  - id: p01_f11
    text: 2026-04-07 (火) の実働 10:40、残業 02:40、備考「外出多」
  - id: p01_f12
    text: 2026-04-09 (木) の実働 07:30、ステータス 要修正、備考「半休 (午後)」
  - id: p01_f13
    text: 土日 (4/4・4/5) は表示されていない (連続営業日のみ)
  - id: p01_f14
    text: 'summary 行: 合計実働 60:25、合計残業 5:25、8 営業日'
  - id: p01_f15
    text: アクションボタンは エクスポート / 新規追加 / 編集 / 削除 の 4 つ
  - id: p01_f16
    text: 赤吹き出し C1 の文言は「目立たせて」
  - id: p01_f17
    text: 赤吹き出し C2 の文言は「警告つけて」
  - id: p01_f18
    text: 赤吹き出し C3 の文言は「→ 右へ」
  - id: p01_f19
    text: 赤吹き出し C4 の文言は「曜日いらん」
  - id: p01_f20
    text: 赤吹き出し C5 の文言は「ソート」
  - id: p01_f21
    text: 赤吹き出し C6 の文言は「月次出力」
  - id: p01_f22
    text: 吹き出しは赤色、番号 C1〜C6 の計 6 個
  - id: p01_f23
    text: 'C1 矢印の指示先はテーブルのステータス「承認待」の行 (例: 4/2 や 4/7)'
  - id: p01_f24
    text: C2 矢印の指示先は実働が短い行 (要修正のステータス、4/3 や 4/9)
  - id: p01_f25
    text: C3 矢印の指示先は「エクスポート」ボタン
  - id: p01_f26
    text: C4 矢印の指示先は日付列ヘッダーまたは日付値の (水)(木) 等の曜日括弧表記
  - id: p01_f27
    text: C5 矢印の指示先はテーブル列ヘッダー全般 (列名のソート機能要望)
  - id: p01_f28
    text: C6 矢印の指示先は上部タブの「今月」(月次レポート出力機能要望)
  - id: p01_f29
    text: 'スライド上部の小さいメタ情報行に「勤怠管理 v3.2 - 田中太郎」「Screen-ID: TS-042」「部署: 営業 1 課」'
  - id: p01_f30
    text: 'スライド下部のフッターに「© 2026 ACME Corp. / Confidential」「Last sync: 2026-04-10 20:48」'
p02:
  id: p02
  title: 検索画面 Before / After 比較
  pattern_name: before_after
  description: 'v2: 検索 UI の旧/新を並列、フィルタ詳細・ヘッダーメニュー・フッター違いも含む + 赤矢印 5 本 (vague メモ風)'
  facts:
  - id: p02_f01
    text: 左側は「Before (現行 v2.4)」、右側は「After (改修後 v3.0)」
  - id: p02_f02
    text: Before のヘッダーメニューは Home / Search / Help の 3 項目
  - id: p02_f03
    text: After のヘッダーメニューは Home / Search / お気に入り / 履歴 / Help の 5 項目 (お気に入り ⭐ と履歴 ⏱ が追加)
  - id: p02_f04
    text: Before の検索プレースホルダーは「キーワード入力」
  - id: p02_f05
    text: 'After の検索プレースホルダーは「キーワードまたは商品コード (例: ABC-123)」'
  - id: p02_f06
    text: Before の検索ボタンは「検索」、After は「🔍 検索」(虫眼鏡アイコン付き)
  - id: p02_f07
    text: Before にソート dropdown なし
  - id: p02_f08
    text: 'After のソート dropdown は「並び順: 関連度順 ▼」(オプション: 関連度 / 価格昇 / 新着 / 評価)'
  - id: p02_f09
    text: Before のフィルタはカテゴリ 3 項目 (Books / Electronics / Clothing) + 価格範囲のみ
  - id: p02_f10
    text: After のフィルタはカテゴリ階層構造 (Books に Programming/Design 子、Electronics に Audio/PC 周辺 子)
  - id: p02_f11
    text: After にブランドフィルタ追加 (Sony / Logitech / Apple / その他)
  - id: p02_f12
    text: After に「在庫あり のみ」チェックボックス追加
  - id: p02_f13
    text: 'Before の結果表示は「結果: 12 件」(並び順なし)'
  - id: p02_f14
    text: 'After の結果表示は「結果: 12 件 / 並び順: 関連度順」'
  - id: p02_f15
    text: 両方とも同じ結果件数 (12 件) を表示
  - id: p02_f16
    text: Before の結果行は商品名 + 価格 + 在庫数 のみ
  - id: p02_f17
    text: After の結果行はブランド名併記 (Sony WH-1000XM5 等) + 評価 ⭐ とレビュー件数
  - id: p02_f18
    text: Wireless Headphones の価格は両方とも ¥12,800 / 在庫 42
  - id: p02_f19
    text: USB-C Hub (7-in-1) の価格は ¥4,500 / 在庫 118
  - id: p02_f20
    text: Mech. Keyboard の価格は ¥15,200 / 在庫 7
  - id: p02_f21
    text: Before のページネーションは < 1 2 3 >
  - id: p02_f22
    text: After のページネーションは < 1 2 3 4 5 … 20 > (省略記号と最終ページ 20 まで)
  - id: p02_f23
    text: Before のフッターリンクは 4 つ (利用規約 / プライバシー / FAQ / お問い合わせ)
  - id: p02_f24
    text: After のフッターリンクは 6 つ (上記 + サイトマップ + API ドキュメント)
  - id: p02_f25
    text: 差分注釈は D1〜D5 の 5 個、文言は順に「入力ヒント追加」「フィルタ細かく」「並び替え追加」「メニュー増えた」「ページ拡張」
  - id: p02_f26
    text: D1 矢印は検索プレースホルダー部分を指している (入力ヒントの違い)
  - id: p02_f27
    text: D2 矢印はフィルタエリアを指している (カテゴリ階層 + ブランド + 在庫の追加)
  - id: p02_f28
    text: D3 矢印はソート dropdown を指している (After のみ存在)
  - id: p02_f29
    text: D4 矢印はヘッダーメニュー部分を指している (お気に入り/履歴 追加)
  - id: p02_f30
    text: D5 矢印はページネーション部分を指している (ページ拡張)
  - id: p02_f31
    text: 'subtitle に「TICKET-8421」「Review: 2026-03-15」「鈴木 (UX Lead)」「Diff scope: search-ui only」'
  - id: p02_f32
    text: footer に「Design Review Doc v1.2 / Internal / Sprint 24 / Page 7 of 18」
