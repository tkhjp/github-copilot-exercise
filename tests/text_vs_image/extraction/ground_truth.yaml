p05:
  id: p05
  title: 決済システム 階層ドリルダウン
  pattern_name: hierarchical_drilldown
  description: 'v2: 上: 10 モジュール全体図 / 下: 決済コア拡大 (8 サブ) + 設定パラメータ 12 行表'
  facts:
  - id: p05_f01
    text: 上段のシステム全体図にモジュールが 10 個配置されている
  - id: p05_f02
    text: '全体図モジュール: 認証 / 商品カタログ / 在庫管理 / 決済コア / 通知 / 分析 / レポート / 管理者UI / 監査 / サポート'
  - id: p05_f03
    text: 10 モジュール中、決済コアが赤枠で強調 (拡大対象)
  - id: p05_f04
    text: 下段で決済コアモジュールが拡大表示
  - id: p05_f05
    text: 決済コアのサブモジュールは 8 つ
  - id: p05_f06
    text: 'サブモジュール: PG アダプタ / 手数料計算 / リトライ制御 / ログ/監査 / ハンドラ / Webhook 配信 / 為替換算 / 不正検知'
  - id: p05_f07
    text: '設定パラメータ表の列は 4 列: パラメータ / 単位 / 現行値 / 推奨値'
  - id: p05_f08
    text: 設定パラメータ表は 12 行
  - id: p05_f09
    text: 'retry_max: 現行 3 回 / 推奨 5 回'
  - id: p05_f10
    text: 'timeout_sec: 現行 10 秒 / 推奨 15 秒'
  - id: p05_f11
    text: 'idempotency_key_ttl: 現行 24 時間 / 推奨 72 時間'
  - id: p05_f12
    text: 'log_retention: 現行 30 日 / 推奨 180 日'
  - id: p05_f13
    text: 'webhook_max_concurrent: 現行 10 同時 / 推奨 30'
  - id: p05_f14
    text: 'fx_rate_cache_ttl: 現行 5 分 / 推奨 15 分'
  - id: p05_f15
    text: 'fraud_score_threshold: 現行 60 点 / 推奨 75 点'
  - id: p05_f16
    text: 'pg_adapter_pool_size: 現行 20 接続 / 推奨 50'
  - id: p05_f17
    text: 'audit_buffer_size: 現行 16 MB / 推奨 64 MB'
  - id: p05_f18
    text: 'batch_settle_window: 現行 1 時間 / 推奨 4 時間'
  - id: p05_f19
    text: 'alert_latency_p99: 現行 800 ms / 推奨 500 ms (こちらは現行値より小さく)'
  - id: p05_f20
    text: 'circuit_breaker_threshold: 現行 50% / 推奨 30% (こちらも現行より低く)'
  - id: p05_f21
    text: 注釈は M1 / M2 の 2 個、文言は「ここ拡大」「要見直し」
  - id: p05_f22
    text: M1 は上段の決済コアから下段拡大エリアへのドリルダウン関係を指す
  - id: p05_f23
    text: M2 は設定パラメータ表 (推奨値が現行と大きく違うパラメータ) を指す
  - id: p05_f24
    text: 階層は 2 段 (全体 10 モジュール → 拡大対象 1 つ → サブモジュール 8 + 設定表)
  - id: p05_f25
    text: 'subtitle: env: production-apac | Owner: Platform Team | Last audit: 2026-03-15 | v2.7.3'
  - id: p05_f26
    text: 'footer: Platform Docs / Last modified: 2026-04-15 / Confidential'
p06:
  id: p06
  title: ダッシュボード デザインレビュー (赤入れ)
  pattern_name: review_comments
  description: ダッシュボードモック 1 枚 (8 セクション) + 番号付き赤コメント 25 個 (短文 / 抽象表記) + 指示線。コメントは答えを書かず短い記号・略語で示し、対象は配置から推論
  facts:
  - id: p06_f01
    text: モックアップは 8 セクション (ヘッダー / ブレッドクラム / サイドナビ / KPI カード / 売上推移グラフ / フィルタチップ列 / 取引テーブル / フッター)
  - id: p06_f02
    text: サイドナビは 7 項目
  - id: p06_f03
    text: KPI カードは 5 枚
  - id: p06_f04
    text: 取引テーブルは 8 行
  - id: p06_f05
    text: 赤コメントは 25 個 (R01-R25)
  - id: p06_f06
    text: コメントは赤色の番号付き吹き出しで右側 2 列に配置
  - id: p06_f07
    text: 指示線が対象要素と各コメントを結んでいる
  - id: p06_f08
    text: 'R01: 中央？'
  - id: p06_f09
    text: 'R02: 重い'
  - id: p06_f10
    text: 'R03: 🔍小'
  - id: p06_f11
