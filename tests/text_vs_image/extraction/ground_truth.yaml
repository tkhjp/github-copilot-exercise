p02:
  id: p02
  title: 検索画面 Before / After 比較
  pattern_name: before_after
  description: 旧/新の検索画面 SS を並べ、差分を赤矢印 3 本で指示
  facts:
  - id: p02_f01
    text: 左側は「Before (現行)」、右側は「After (改修後)」
  - id: p02_f02
    text: Before の検索プレースホルダーは「キーワード入力」
  - id: p02_f03
    text: After の検索プレースホルダーは「キーワードまたは商品コード」
  - id: p02_f04
    text: 両方に「検索」ボタンがある
  - id: p02_f05
    text: Before のフィルタは 1 行
  - id: p02_f06
    text: After のフィルタは 3 行
  - id: p02_f07
    text: 'Before の結果表示は「結果: 12 件」'
  - id: p02_f08
    text: 'After の結果表示は「結果: 12 件 / 並び順: 関連度順」'
  - id: p02_f09
    text: Before のページネーションは < 1 2 3 >
  - id: p02_f10
    text: After のページネーションは < 1 2 3 4 5 … 20 >
  - id: p02_f11
    text: '差分 D1: プレースホルダーに「商品コード」追加'
  - id: p02_f12
    text: '差分 D2: フィルタ 1 行 → 3 行'
  - id: p02_f13
    text: '差分 D3: ページネーションに省略記号と最終ページ'
  - id: p02_f14
    text: 差分矢印は赤色、番号 D1〜D3
  - id: p02_f15
    text: 差分矢印は Before/After 両側の対応要素を指している
  - id: p02_f16
    text: 両画面とも同じ結果件数 (12 件) を示している
  - id: p02_f17
    text: スライドには Before と After の 2 つの画面が並んでいる
  - id: p02_f18
    text: 'スライド上部 (タイトル直下) の小さいメタ情報行: TICKET-8421 | Review: 2026-03-15 | 鈴木 (UX Lead)'
  - id: p02_f19
    text: 'スライド下部のフッター: Design Review Doc v1.2 / Internal'
p03:
  id: p03
  title: 購入フロー 5 画面操作手順
  pattern_name: process_flow
  description: ログイン→商品選択→カート→決済→完了 の 5 画面 SS を番号付き矢印で連結
  facts:
  - id: p03_f01
    text: 5 画面の操作フローを示している
  - id: p03_f02
    text: 'Step 1: ログイン画面'
  - id: p03_f03
    text: Step 1 の入力項目は「メール + パスワード」
  - id: p03_f04
    text: 'Step 2: 商品選択画面'
  - id: p03_f05
    text: Step 2 にカテゴリ絞込がある
  - id: p03_f06
    text: Step 2 には 3 商品のサムネイルが表示されている
  - id: p03_f07
    text: 'Step 3: カート画面'
  - id: p03_f08
    text: カート内は 2 商品
  - id: p03_f09
    text: カートの小計は ¥8,300
  - id: p03_f10
    text: 'Step 4: 決済画面'
  - id: p03_f11
    text: 決済方法はクレジットカード / PayPay / コンビニの 3 種
  - id: p03_f12
    text: 'Step 5: 完了画面'
  - id: p03_f13
    text: 注文番号は ORD-2026-04-13579
  - id: p03_f14
    text: 各画面間は番号付き矢印 S1→S2→S3→S4→S5 で連結
  - id: p03_f15
    text: 矢印は左から右への単方向
  - id: p03_f16
    text: ステップ番号は S1 から S5 まで
  - id: p03_f17
    text: 'スライド上部 (タイトル直下) の小さいメタ情報行: UI Build ui-v2.1 | Session timeout: 30 min | Updated 2026-04-10'
  - id: p03_f18
    text: 'スライド下部のフッター: User Research Team / Page 1 of 1'
