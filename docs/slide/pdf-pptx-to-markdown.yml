app:
  description: 複数ページの PDF / PPTX を Markdown 化。PDF は PDF Process(pdf_to_png) で全ページを PNG 化し、Iteration
    で各ページを Gemini(VLM) が書き起こし。PPTX は markitdown でテキスト抽出。使用プラグインは PDF Process / markitdown
    / gemini のみ。出力は結合した Markdown テキスト。
  icon: 📄
  icon_background: '#FFEAD5'
  mode: workflow
  name: PDF・PPTX → Markdown 変換（VLM・3プラグイン構成）
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.3.1
