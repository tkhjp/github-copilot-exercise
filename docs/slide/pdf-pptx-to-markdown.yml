    nodes:
    - data:
        desc: PDF または PPTX を1つアップロード
        selected: false
        title: 開始
        type: start
        variables:
        - allowed_file_extensions:
          - .PDF
          - .PPTX
          - .PPT
          allowed_file_types:
          - document
          allowed_file_upload_methods:
