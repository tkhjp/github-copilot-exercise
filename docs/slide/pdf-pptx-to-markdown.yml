    - data:
        desc: PDF の全ページを PNG 画像に変換（配列で出力）
        is_team_authorization: true
        params:
          pdf_content: ''
          zoom: ''
        provider_id: kalochin/pdf_process/pdf_process
        provider_name: kalochin/pdf_process/pdf_process
        provider_type: builtin
        selected: false
        title: PDF→PNG (PDF Process)
        tool_configurations: {}
        tool_description: Convert each PDF page to a PNG image
        tool_label: PDF to PNG Converter
        tool_name: pdf_to_png
        tool_node_version: '2'
        tool_parameters:
          pdf_content:
            type: variable
            value:
            - start
            - file
          zoom:
            type: constant
            value: 3
        type: tool
      height: 116
      id: pdf2png
      position:
        x: 680
        y: 180
      positionAbsolute:
        x: 680
        y: 180
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        code: |
          def main(pages: list) -> dict:
              # 品質ガード: ページ画像が大きすぎたら処理を止めてエラーにする。
              # Gemini は大きい画像を内部で縮小するため、巨大/高密度ページは小さな文字が
              # 失われる恐れがある。不完全な結果を返すより、ここで明示的に失敗させる方針。
              # ※ Dify の File はバイトサイズ(size)のみ取得可能（ピクセル寸法は不可）。
              MAX_PAGE_PNG_MB = 7.0  # ← 自分の資料に合わせて調整（成功時の max_mb を見て決める）
              sizes_mb = []
              oversized = []
              for i, f in enumerate(pages, start=1):
                  size = (f or {}).get("size") or 0
                  mb = round(size / 1024 / 1024, 2)
                  sizes_mb.append(mb)
                  if mb > MAX_PAGE_PNG_MB:
                      oversized.append(f"page {i}={mb}MB")
              if oversized:
                  raise Exception(
                      f"ページ画像が大きすぎます (上限 {MAX_PAGE_PNG_MB}MB): "
                      + ", ".join(oversized)
                      + " / zoom を下げるか、該当ページを分割してください。"
                  )
              return {
                  "page_count": len(pages),
                  "max_mb": max(sizes_mb) if sizes_mb else 0,
                  "sizes_mb": sizes_mb,
              }
        code_language: python3
        desc: ページ画像が大きすぎる場合はエラー停止（不完全な結果を返さない）
        outputs:
          max_mb:
            children: null
            type: number
          page_count:
            children: null
            type: number
          sizes_mb:
            children: null
            type: array[number]
        selected: false
        title: 画像サイズ検査
        type: code
        variables:
        - value_selector:
          - pdf2png
          - files
          variable: pages
      height: 54
      id: sizecheck
      position:
        x: 940
        y: 40
      positionAbsolute:
        x: 940
        y: 40
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: 各ページを Gemini で視覚転写
        error_handle_mode: terminated
        height: 250
        is_parallel: false
        iterator_input_type: array[file]
        iterator_selector:
        - pdf2png
        - files
        output_selector:
        - vlm
        - text
        output_type: array[string]
        parallel_nums: 5
        selected: false
        start_node_id: iterstart
        title: ページごとに反復
        type: iteration
        width: 520
      height: 250
      id: iter
      position:
        x: 980
        y: 160
      positionAbsolute:
        x: 980
        y: 160
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 520
      zIndex: 1
    - data:
        desc: ''
        isInIteration: true
        selected: false
        title: ''
        type: iteration-start
      draggable: false
      height: 48
      id: iterstart
      parentId: iter
      position:
        x: 24
        y: 100
      positionAbsolute:
        x: 1004
        y: 260
      selectable: false
      sourcePosition: right
      targetPosition: left
      type: custom-iteration-start
      width: 44
      zIndex: 1002
    - data:
        context:
          enabled: false
          variable_selector: []
        desc: Gemini flash-lite が画像を見てページを書き起こす
        isInIteration: true
        isInLoop: false
        iteration_id: iter
        model:
          completion_params:
            temperature: 0.2
          mode: chat
          name: gemini-3.1-flash-lite
          provider: langgenius/gemini/google
        prompt_template:
        - id: sys-transcribe
          role: system
          text: |
            あなたは、与えられた **1 ページ分の画像**（PDF のページ、または PPT 由来のスライド画像）を、
            **漏れなく原文のまま** Markdown に書き起こす OCR/VLM 転写エンジンです。
            入力画像は常に「ドキュメントの 1 ページ」です。複数ページをまたぐ推論はせず、目の前の 1 枚に集中してください。

            以下の手順を必ず順番に実行してください。

            # Step 1 — 構造把握 (頭の中で、出力不要)
            画像を上から下、左から右に走査し、以下を数えてください:
            - 表 (table) の数 / 各表の行数・列数
            - グラフ・チャートの数と種類 (棒 / 円 / 折れ線 など)
            - 注釈・吹き出し・赤枠・矢印の数
            - ヘッダー / サブタイトル / フッターの有無 (薄い muted テキスト含む)

            # Step 2 — 要素ごとに書き起こし
            以下の順序で、各要素を漏らさず書き起こしてください:

            1. **タイトル + サブタイトル + メタ情報**
               - 主タイトルだけでなく、その直下にある小さい muted テキスト (実施日 / バージョン / 担当者 / チケット番号 / 環境名など) も必ず書き起こす。
            2. **画面・モックアップ本体**
               - 上から下、左から右の順に UI ブロックを順次書き起こす。
               - ヘッダーの右上アイコン、通知バッジの数字、タブのアクティブ状態、ドロップダウンの開閉状態、ボタンラベルなど、小さい要素も省略しない。
            3. **表 (table)**
               - 表のタイトル / 列見出し / 全行を、Markdown のテーブル記法で書き起こす。
               - **1 行たりとも省略しない**。N 行あれば N 行すべて。
               - 文字が小さく見える場合も即座に「判読不能」とせず、まず一度よく見てから判断する。本当にどうしても読み取れない場合のみ「[判読不能]」と明示する。
            4. **グラフ・チャート**
               - タイトル、X 軸ラベル、Y 軸ラベル、凡例。
               - 各データポイントの値を全て書き出す (棒 12 本なら 12 個、円グラフ 8 セグメントなら 8 個)。
            5. **コード片**
               - ファイル名 / 言語、import 行、デコレータ、関数シグネチャ (型注釈含む)、本体行、try/except の例外型まで全行を書き起こす。fenced code block で囲む。
            6. **吹き出し・赤枠・コメント注釈**
               - 番号 (例 C1, R01, A01, D1, M1) + 本文を verbatim で。
               - **さらに、それぞれの吹き出しが指している対象を「→ ◯◯ を指している」と併記**する。判定基準は: 矢印の先の要素、または配置上最も近い画面要素。
               - 略記コメント (例 「中央?」「5→4」「16→24」「#f5f5f5」「M.O.」など) はそのまま記録し、対象要素を別途明記する。
            7. **組織図 / フロー図のノード**
               - ノードごとに、書かれている全属性 (氏名 / 役職 / 入社年 / 配下人数 / 部門色帯のラベルなど) を漏らさず。
               - 親子関係 (実線) と兼務関係 (点線) があれば区別して書く。
            8. **フッター**
               - ページ最下部の小さい muted テキスト (チーム名 / 機密区分 / 文書バージョンなど) も必ず書く。

            # Step 3 — 表記ルール
            - 時刻は HH:MM (コロン区切り)。`60:25` を `60.25` のような decimal に変換しない。
            - 金額は元のまま (`¥4,200`、`164M`、`365 MJPY` など)、カンマ・通貨記号を保持。
            - 割合は `%` 記号を維持 (`+12%`、`-0.5pt`)。符号 (+ / −) も保持。
            - 状態記号 (○ / △ / × / ✓ / ▲) はそのまま。
            - カラーコード (`#3b6db8` 等) や ピクセル値 (`16px`、`16→24`) も書かれているまま。
            - 部門色帯がある場合は、色 + ラベルを併記 (例: `青 (Tech)`、`緑 (Sales)`)。

            # Step 4 — 厳守事項
            - 要約 / 解釈 / 言い換えは禁止。書いてあるままに書く。
            - 元のドキュメントにない情報を推測で追加しない。
            - 1 行 / 1 セル / 1 注釈たりとも省略しない。
            - **ページ見出し (## ページ N / ## Slide N) は出力しないこと。** ページ番号と区切りはシステム側で自動付与します。あなたはこの 1 ページの本文のみを返してください。
            - 前置き・後書き・「以下に書き起こします」などのメタ発話は禁止。Markdown 本文のみを返す。

            # Step 5 — 自己確認 (出力末尾に必ず書く)
            最後に `---` 区切りを入れ、以下のフォーマットで、このページについての件数照合を 1 行ずつ書いてください:
            - 表: 検出 X 行 / 書き起こし Y 行 (X = Y であること)
            - 注釈・吹き出し: 検出 X 個 / 書き起こし Y 個
            - グラフ データポイント: 検出 X 個 / 書き起こし Y 個
            - ノード (組織図など): 検出 X / 書き起こし Y

            X ≠ Y のズレがあれば、戻って再走査し補完してから返答する。
        - id: usr-page
          role: user
          text: このページを書き起こしてください。
        selected: false
        title: 視覚転写 (Gemini)
        type: llm
        vision:
          configs:
            detail: high
            variable_selector:
            - iter
            - item
          enabled: true
      height: 120
      id: vlm
      parentId: iter
      position:
        x: 120
        y: 100
      positionAbsolute:
        x: 1100
        y: 260
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
      zIndex: 1002
    - data:
        code: |
          def main(pages: list) -> dict:
              parts = []
              for i, md in enumerate(pages, start=1):
                  text = (md or "").strip()
                  parts.append(f"## ページ {i}\n\n{text}")
              return {
                  "markdown": "\n\n---\n\n".join(parts),
                  "page_count": len(parts),
              }
        code_language: python3
        desc: 各ページの Markdown をページ番号付きで結合
        outputs:
          markdown:
            children: null
            type: string
          page_count:
            children: null
            type: number
        selected: false
        title: 結合（ページ番号付与）
        type: code
        variables:
        - value_selector:
          - iter
          - output
          variable: pages
      height: 54
      id: joincode
      position:
        x: 1560
        y: 180
      positionAbsolute:
        x: 1560
        y: 180
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: PPTX からテキストを抽出して Markdown 化（テキストのみ）
        is_team_authorization: true
        params:
          files: ''
        provider_id: yevanchen/markitdown/markitdown
        provider_name: yevanchen/markitdown/markitdown
        provider_type: builtin
        selected: false
        title: markitdown (PPTX)
        tool_configurations: {}
        tool_description: Convert office documents to Markdown
        tool_label: markitdown
        tool_name: markitdown
        tool_node_version: '2'
        tool_parameters:
          files:
            type: variable
            value:
            - start
            - file
        type: tool
      height: 116
      id: mkit
      position:
        x: 680
        y: 460
      positionAbsolute:
        x: 680
        y: 460
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: PDF / PPTX どちらかの結果を統合
        output_type: string
        selected: false
        title: 結果をマージ
        type: variable-aggregator
        variables:
        - - joincode
          - markdown
        - - mkit
          - text
      height: 130
      id: agg
      position:
        x: 1880
        y: 300
      positionAbsolute:
        x: 1880
        y: 300
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        desc: 結合した Markdown を出力
        outputs:
        - value_selector:
          - agg
          - output
          value_type: string
          variable: markdown
        selected: false
        title: 終了
        type: end
      height: 90
      id: end
      position:
        x: 2200
        y: 300
      positionAbsolute:
        x: 2200
        y: 300
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    viewport:
      x: 0
      y: 0
      zoom: 0.7
