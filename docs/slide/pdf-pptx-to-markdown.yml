      targetPosition: left
      type: custom
      width: 244
    - data:
        cases:
        - case_id: 'true'
          conditions:
          - comparison_operator: is
            id: cond-pdf-lower
            value: .pdf
            varType: string
            variable_selector:
            - start
            - file
            - extension
          - comparison_operator: is
            id: cond-pdf-upper
            value: .PDF
            varType: string
            variable_selector:
            - start
            - file
            - extension
          id: 'true'
          logical_operator: or
        desc: PDF はページ画像→視覚転写、その他(PPTX)は markitdown へ
        selected: false
        title: PDF かどうか
        type: if-else
      height: 150
      id: branch
      position:
        x: 380
        y: 300
      positionAbsolute:
        x: 380
        y: 300
